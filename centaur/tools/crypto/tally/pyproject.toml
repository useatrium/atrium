[project]
name = "tally"
description = "Tally — on-chain governance proposals, voting, and delegates"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "TALLY_API_KEY", mode = "inject", inject_header = "Api-Key", hosts = ["api.tally.xyz"]}]
