# Mobile E2E: validate the entry-comment affordance on a chat message.
#
# This is the flow idb could NOT drive — idb's synthetic `tap --duration` does not
# register as a React-Native long-press. Maestro's `longPressOn` injects the gesture
# through the accessibility layer, which RN recognises. This is the going-forward way
# to validate touch interactions (long-press, swipe, etc.).
#
# NOTE on selectors: Maestro matches an element's FULL text (anchored regex), so a
# substring of a message row must be wrapped in `.*…*`.
#
# Prereqs (see .maestro/README.md): Atrium server on :3001, Metro running, the dev
# build installed on a booted iOS sim, and EXPO_PUBLIC_AUTO_LOGIN set so the app lands
# logged-in on a populated workspace.
appId: chat.atrium.app
---
- launchApp:
    clearState: false
# Dev builds pop the Expo dev-client menu (a native sheet, not in the RN tree) async
# on launch. Dismiss it by tapping the dimmed backdrop above it, retrying until the
# channel list is reachable.
- retry:
    maxRetries: 5
    commands:
      - tapOn:
          point: "50%,8%"
      - extendedWaitUntil:
          visible: "CHANNELS"
          timeout: 4000

# open a channel
- tapOn: "general"
- extendedWaitUntil:
    visible: "Message #general"
    timeout: 10000

# post a fresh, comment-able message (agent-session rows are intentionally excluded)
- tapOn: "Message #general"
- inputText: "Maestro comment probe"
- tapOn: "Send message"
- extendedWaitUntil:
    visible: ".*Maestro comment probe.*"
    timeout: 15000

# THE interaction idb couldn't reach: long-press opens the action sheet.
# A synthetic long-press occasionally doesn't register as RN's onLongPress, so retry
# the gesture until the sheet's "Comments" action appears.
- retry:
    maxRetries: 5
    commands:
      - longPressOn: ".*Maestro comment probe.*"
      - extendedWaitUntil:
          visible: "Comments"
          timeout: 3000
- takeScreenshot: longpress-menu

# …and "Comments" opens the EntryComments sheet
- tapOn: "Comments"
- assertVisible: "No comments yet."
- takeScreenshot: comments-sheet

# add a comment and confirm it renders (the comment composer has its own labels)
- tapOn: ".*Add a comment.*"
- inputText: "validated by maestro"
- tapOn: "Send comment"
- assertVisible: ".*validated by maestro.*"
- takeScreenshot: comment-posted
