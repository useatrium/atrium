services:
  # Voice STT is disabled by default. To test real local transcription, run the
  # server with STT_PROVIDER=whispercpp plus WHISPER_MODEL_PATH/WHISPER_BIN
  # after installing ffmpeg and whisper.cpp on the server host/container.
  db:
    image: postgres:16
    container_name: atrium-surface-db
    environment:
      POSTGRES_DB: atrium
      POSTGRES_USER: atrium
      POSTGRES_PASSWORD: atrium
    ports:
      - "5433:5432"
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrium -d atrium"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:latest
    container_name: atrium-surface-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atrium
      MINIO_ROOT_PASSWORD: atrium-dev-secret
      # Browser uploads PUT directly to presigned URLs from the Vite origin.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atrium_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30

  livekit:
    image: livekit/livekit-server:latest
    container_name: atrium-surface-livekit
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "7880:7880" # WebSocket signaling: LIVEKIT_URL=ws://localhost:7880
      - "7881:7881/tcp" # WebRTC over TCP fallback
      - "50000-50100:50000-50100/udp" # WebRTC UDP media range for dev
    volumes:
      - ./deploy/livekit.dev.yaml:/etc/livekit.yaml:ro

volumes:
  atrium_pgdata:
  atrium_minio:
