services:
  db:
    image: postgres:16
    container_name: atrium-surface-db
    environment:
      POSTGRES_DB: atrium
      POSTGRES_USER: atrium
      POSTGRES_PASSWORD: atrium
    ports:
      - "5433:5432"
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrium -d atrium"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:latest
    container_name: atrium-surface-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atrium
      MINIO_ROOT_PASSWORD: atrium-dev-secret
      # Browser uploads PUT directly to presigned URLs from the Vite origin.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atrium_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  atrium_pgdata:
  atrium_minio:
