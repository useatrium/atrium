route:
  receiver: external-fallback
  group_by: ["alertname", "job"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # Run any small local receiver on the host at :3209/alerts, or replace this
  # with email/pager config in dogfood. This is intentionally outside Atrium so
  # app outages can still alert.
  - name: external-fallback
    webhook_configs:
      - url: http://host.docker.internal:3209/alerts
        send_resolved: true
