api_host:
  host: api.example.com
  http_methods: ["POST"]
  paths: ["/v1/*"]

internal_cidr:
  cidr: 10.0.0.0/8
  http_methods: []
  paths: []

wildcard_host:
  host: "*"
  http_methods: ["*"]
  paths: []

gcp_googleapis:
  host: "*.googleapis.com"
  http_methods: []
  paths: []
  gcp_auth_secret: acme_bigquery

gcp_id_token_cloud_run:
  host: my-service-abc123-uc.a.run.app
  http_methods: []
  paths: []
  position: 0
  gcp_id_token_secret: acme_cloud_run

oauth_gmail_host:
  host: gmail.googleapis.com
  http_methods: ["GET"]
  paths: []
  oauth_token_secret: acme_gmail_oauth

managed_gmail_host:
  host: "*.googleapis.com"
  http_methods: []
  paths: []
  static_secret: acme_managed_gmail_secret

hmac_webhook_host:
  host: hooks.example.com
  http_methods: ["POST"]
  paths: []
  hmac_secret: acme_webhook_hmac

aws_cloudwatch_logs_host:
  host: logs.us-west-2.amazonaws.com
  http_methods: ["POST"]
  paths: []
  position: 0
  aws_auth_secret: acme_cloudwatch_aws
