# Atrium local overrides, layered after contrib/chart/values.dev.yaml.
# Env-mode secrets (no 1Password), no Slack, api-rs sessions, Codex harness.

api:
  enabled: false

apiRs:
  enabled: true
  sandboxWarmPoolSize: 0
  ironProxy:
    mode: disabled

secretManager:
  backend: env
  envPrefix: ""
  existingSecretName: centaur-infra-env

ironProxy:
  secretSource: env
  manager:
    secretSource: env

slackbot:
  enabled: false

slackbotv2:
  enabled: false

discordbot:
  enabled: false

# Broker requires a writable (1Password) backend; not used in Phase 0.
tokenBroker:
  enabled: false

sandbox:
  harnessEngine: codex
  extraEnv:
    DISABLE_TELEMETRY: "1"
    DISABLE_ERROR_REPORTING: "1"
    # Hide the ~78 upstream tool plugins (crypto/business/comms/observability)
    # from `centaur-tools list`. None of them work in Atrium sandboxes today:
    # their CLIs are uvx scripts that resolve deps from pypi.org at first run,
    # which the egress proxy blocks, and no tool credentials are granted — so
    # the catalog only baits agents into dead ends (observed: a session burned
    # turns on `vmetrics`/`cloudwatch`). An EMPTY value means "install all"
    # (upstream backward compat), so use a no-match placeholder. When a tool is
    # actually wired up (creds granted + deps installable), list its package
    # name here, comma-separated. The name matched is the tool's DIRECTORY name
    # under centaur/tools (install_tool_shims.py compares package_dir.name).
    TOOL_ALLOWLIST: "atrium-preview"
    # To surface Codex's live "thinking" in the transcript, set
    # CODEX_MODEL_REASONING_SUMMARY: "auto" here (Codex >= 0.139 emits no summaries
    # by default; consumed by services/sandbox/entrypoint.sh). Left off for now — the
    # transcript shows a content-independent "Thinking…" activity indicator instead.
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

# node-sync's Surface address is topology-specific. Deliberately do not set
# atriumBaseUrl or atriumEgress here: callers must provide them in their own
# values layer (for example deploy/values.box.yaml) or with --set. A guessed
# Docker/kind IP can silently send every capture to the wrong host.
nodeSync:
  enabled: true
  overlayProvisioning:
    enabled: true
    flatHome: true
  extraEnv:
    # #213: the daemon deletes evicted (dead) sessions' overlay dirs so disk
    # stays bounded — eviction alone only stops the polling, not the pileup.
    NODE_SYNC_GC_DIRS: "1"
  apiKeySecret:
    key: ARTIFACT_CAPTURE_API_KEY
