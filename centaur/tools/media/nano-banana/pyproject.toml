[project]
name = "nano-banana"
description = "Nano Banana CLI for Google Gemini image generation"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "google-genai>=1.0.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "httpx>=0.27.0",
    "Pillow>=10.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
nano-banana = "centaur_tool_nano_banana.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_nano_banana"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [
    {type = "http", name = "GOOGLE_API_KEY", mode = "inject", inject_header = "x-goog-api-key", hosts = ["generativelanguage.googleapis.com"]},
]
