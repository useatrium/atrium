[project]
name = "snapshot"
description = "Snapshot — off-chain governance voting, proposals, and spaces"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
snapshot = "centaur_tool_snapshot.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_snapshot"

[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "SNAPSHOT_API_KEY", mode = "inject", inject_header = "x-api-key", hosts = ["hub.snapshot.org"]}]
