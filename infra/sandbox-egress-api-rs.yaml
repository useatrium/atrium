apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-egress-api-rs-artifacts
  namespace: centaur
spec:
  podSelector:
    matchLabels:
      centaur.ai/managed-by: api-rs
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-rs
              app.kubernetes.io/instance: centaur
              app.kubernetes.io/name: centaur
      ports:
        - port: 8080
          protocol: TCP
