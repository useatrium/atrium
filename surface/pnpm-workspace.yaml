packages:
  - server
  - shared
  - centaur-client
  - web
  - e2e
  - mobile
  - desktop
  - mcp

# pnpm's trust heuristic flags old-but-canonical packages (published before npm
# provenance existed) when a newer sibling version has provenance. These pinned
# legacy versions are well-known safe transitive deps (Babel/npm ecosystem).
trustPolicyExclude:
  - semver@6.3.1
  - semver@5.7.2
  - ua-parser-js@0.7.41
  # react-native-reanimated v4 peer; fresh release lacks provenance attestation (Expo SDK 56)
  - react-native-worklets@0.8.3
