# Atrium local overrides, layered after contrib/chart/values.dev.yaml.
# Env-mode secrets (no 1Password), no Slack, api-rs sessions, Codex harness.

api:
  enabled: false

apiRs:
  enabled: true
  sandboxWarmPoolSize: 0

secretManager:
  backend: env
  envPrefix: ""
  existingSecretName: centaur-infra-env

ironProxy:
  secretSource: env
  manager:
    secretSource: env

slackbot:
  enabled: false

slackbotv2:
  enabled: false

discordbot:
  enabled: false

# Broker requires a writable (1Password) backend; not used in Phase 0.
tokenBroker:
  enabled: false

sandbox:
  harnessEngine: codex
  extraEnv:
    DISABLE_TELEMETRY: "1"
    DISABLE_ERROR_REPORTING: "1"
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi
