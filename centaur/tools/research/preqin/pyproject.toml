[project]
name = "preqin"
description = "Preqin Operational API and Feeds API client for fund and fund-manager data"
version = "0.1.1"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.scripts]
preqin = "centaur_tool_preqin.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["centaur_tool_preqin"]

[tool.hatch.build.targets.wheel.sources]
"centaur_tool_preqin" = "centaur_tool_preqin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
hosts = ["api.preqin.com", "id.preqin.com", "feeds.preqin.com"]
