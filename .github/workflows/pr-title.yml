name: PR Title

# Squash-merge uses the PR *title* as the master commit subject
# (squash_merge_commit_title=PR_TITLE). Enforce Conventional Commits on the
# title so master stays consistent and changelog/release automation can parse
# it later. This does not touch individual branch commits — those are squashed
# away — so contributors never need to clean up their own history.

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  merge_group:
    types: [checks_requested]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Skip title validation for merge queue
        if: github.event_name == 'merge_group'
        run: echo "PR title was validated before entering the merge queue."

      - uses: amannn/action-semantic-pull-request@v5
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
