# Atrium local overrides, layered after contrib/chart/values.dev.yaml.
# Env-mode secrets (no 1Password), no Slack, api-rs sessions, Codex harness.

api:
  enabled: false

apiRs:
  enabled: true
  sandboxWarmPoolSize: 0
  ironProxy:
    mode: disabled

secretManager:
  backend: env
  envPrefix: ""
  existingSecretName: centaur-infra-env

ironProxy:
  secretSource: env
  manager:
    secretSource: env

slackbot:
  enabled: false

slackbotv2:
  enabled: false

discordbot:
  enabled: false

# Broker requires a writable (1Password) backend; not used in Phase 0.
tokenBroker:
  enabled: false

sandbox:
  harnessEngine: codex
  extraEnv:
    DISABLE_TELEMETRY: "1"
    DISABLE_ERROR_REPORTING: "1"
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

# Local node-sync calls Atrium from inside kind. The runbook attaches
# atrium-prod-server-1 to the `kind` Docker network, where the usual IP is
# 172.18.0.3 after the control-plane node takes 172.18.0.2.
nodeSync:
  enabled: true
  overlayProvisioning:
    enabled: true
    flatHome: true
  atriumBaseUrl: "http://172.18.0.3:3001"
  atriumEgress:
    enabled: true
    ipBlock: "172.18.0.3/32"
    port: 3001
  apiKeySecret:
    key: ARTIFACT_CAPTURE_API_KEY
