name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  surface:
    name: Surface
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run inside the official Playwright image: browsers + system deps are
    # pre-installed, so there is no flaky azureedge browser download (which
    # deterministically hung after the main artifact on GitHub runners). Tag
    # MUST track the pinned @playwright/test version in surface/e2e.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atrium
        options: >-
          --health-cmd "pg_isready -U atrium -d atrium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Inside a job container, service containers are reached by their label
      # hostname on the container port (not localhost:5433).
      DATABASE_URL: postgres://atrium:atrium@postgres:5432/atrium
      # The mobile typecheck regenerates Expo typed routes; keep the CLI off
      # the network.
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          # Must match the packageManager pin in surface/package.json (the
          # action fails on mismatch, which is the point — one pnpm line
          # everywhere, including Docker).
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: surface/pnpm-lock.yaml

      - name: Install surface workspace
        working-directory: surface
        run: pnpm install --frozen-lockfile

      - name: Lint surface workspace
        working-directory: surface
        timeout-minutes: 2
        run: pnpm lint

      - name: Typecheck surface workspace
        working-directory: surface
        timeout-minutes: 4
        run: pnpm -r typecheck

      # centaur-client has no typecheck script — its tsc build IS its typecheck,
      # and pack/publish consumers (publishConfig) expect dist/ to compile.
      - name: Build centaur client
        working-directory: surface
        run: pnpm --filter @atrium/centaur-client build

      # Production web build: Caddy serves web/dist in prod but nothing else
      # exercises it (e2e uses the Vite dev server). ~3s, so verify it here.
      - name: Build web production bundle
        working-directory: surface
        run: pnpm --filter @atrium/web build

      # The workspace root's test script recurses into packages, so exclude it
      # explicitly. Server tests are parallel-safe because each Vitest worker
      # gets its own Postgres database.
      - name: Test surface workspace
        working-directory: surface
        timeout-minutes: 6
        run: pnpm --filter '!atrium-surface' -r test

      # No browser-install step: the Playwright container already has Chromium.
      # Per-step timeout so a webServer/teardown hang is killed fast and
      # attributed, instead of silently eating the whole job budget.
      - name: Run Playwright e2e
        working-directory: surface
        timeout-minutes: 10
        shell: bash
        env:
          # playwright.config.ts reads E2E_DATABASE_URL for the webServer (it
          # falls back to a localhost:5433 default otherwise). db-reset.mjs
          # creates/truncates this dedicated DB using the atrium DB on the same
          # Postgres service as admin.
          E2E_DATABASE_URL: postgres://atrium:atrium@postgres:5432/atrium_e2e
          # Matches server/src/config.ts default; the in-step MinIO below.
          S3_ENDPOINT: http://127.0.0.1:9000
        run: |
          # Artifact write-back offloads blob bytes to S3, so the conflict e2e
          # needs object storage. Run the current MinIO in-step rather than as a
          # `services:` container: GitHub services can't supply minio/minio's
          # required `server` command, and bitnami's MinIO images were removed
          # from Docker Hub. Creds match config.ts defaults. The process is
          # reaped when the step's shell exits.
          curl -fsSLo "$RUNNER_TEMP/minio" https://dl.min.io/server/minio/release/linux-amd64/minio
          curl -fsSLo "$RUNNER_TEMP/mc" https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x "$RUNNER_TEMP/minio" "$RUNNER_TEMP/mc"
          MINIO_ROOT_USER=atrium MINIO_ROOT_PASSWORD=atrium-dev-secret \
            "$RUNNER_TEMP/minio" server "$RUNNER_TEMP/minio-data" --address ':9000' \
            > "$RUNNER_TEMP/minio.log" 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && break
            sleep 1
          done
          "$RUNNER_TEMP/mc" alias set ci http://127.0.0.1:9000 atrium atrium-dev-secret
          "$RUNNER_TEMP/mc" mb --ignore-existing ci/atrium-files
          pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: surface/e2e/playwright-report/
          if-no-files-found: ignore
