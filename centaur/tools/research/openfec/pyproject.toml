[project]
name = "openfec"
description = "OpenFEC CLI for federal election data"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
openfec = "centaur_tool_openfec.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_openfec"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "DATAGOV_API_KEY", mode = "inject", inject_query_param = "api_key", hosts = ["api.open.fec.gov"]}]
