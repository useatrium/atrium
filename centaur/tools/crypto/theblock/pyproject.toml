[project]
name = "theblock"
description = "The Block CLI for crypto news"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "feedparser>=6.0.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
theblock = "centaur_tool_theblock.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_theblock"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
hosts = ["www.theblock.co"]
secrets = []
