services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-atrium}
      POSTGRES_USER: ${DB_USER:-atrium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_HOST_PORT:-5433}:5432"
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-atrium}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?set MINIO_PASSWORD in .env}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${MINIO_HOST_PORT:-9000}:9000"
    volumes:
      - atrium_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    build:
      context: ../..
      dockerfile: surface/deploy/Dockerfile.server
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-atrium}:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/${DB_NAME:-atrium}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT to a phone-reachable URL}
      S3_BUCKET: ${S3_BUCKET:-atrium-files}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-atrium}
      S3_SECRET_KEY: ${MINIO_PASSWORD:?set MINIO_PASSWORD in .env}
      CENTAUR_BASE_URL: ${CENTAUR_BASE_URL:-http://127.0.0.1:18000}
      CENTAUR_API_KEY: ${CENTAUR_API_KEY:-}
      CENTAUR_HARNESS: ${CENTAUR_HARNESS:-codex}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUSH_REDACT: ${PUSH_REDACT:-1}
      # Voice message STT defaults to noop. To enable self-hosted whisper.cpp,
      # install ffmpeg + whisper.cpp + a model in the image and set:
      # STT_PROVIDER: whispercpp
      # WHISPER_MODEL_PATH: /models/ggml-base.en.bin
      # WHISPER_BIN: whisper-cli
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_HOST_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # LiveKit media ports cannot be reverse-proxied by Caddy's HTTP server.
  # Run the SFU on the host network and open these inbound firewall ports:
  #   80/tcp and 443/tcp if LiveKit terminates TURN/TLS directly
  #   7881/tcp for ICE TCP fallback
  #   3478/udp for TURN/UDP
  #   50000-60000/udp for SFU media
  # If Caddy also binds 443 on this host, either put LiveKit TURN/TLS on a
  # separate IP/L4 proxy or disable Caddy's 443 binding for this compose stack.
  livekit:
    # Opt-in: `docker compose --profile livekit up`. Off by default because host
    # networking + embedded TURN/TLS wants 443, which collides with the caddy
    # profile — run them on separate hosts/IPs, not both in this stack.
    profiles: ["livekit"]
    image: livekit/livekit-server:v1.13
    network_mode: host
    restart: unless-stopped
    environment:
      # Single source of truth: the same keys the Fastify server signs tokens
      # with, so signer and verifier can't disagree (format "key: secret").
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-}: ${LIVEKIT_API_SECRET:-}"
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
      # Mount TLS material when LiveKit terminates embedded TURN/TLS itself:
      # - /etc/letsencrypt/live/turn.example.com/fullchain.pem:/etc/livekit/turn.crt:ro
      # - /etc/letsencrypt/live/turn.example.com/privkey.pem:/etc/livekit/turn.key:ro

  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    depends_on:
      server:
        condition: service_healthy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  atrium_pgdata:
  atrium_minio:
  caddy_data:
  caddy_config:
