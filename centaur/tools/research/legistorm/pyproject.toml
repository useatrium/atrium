[project]
name = "legistorm"
description = "LegiStorm CLI for congressional data"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
legistorm = "centaur_tool_legistorm.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_legistorm"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
hosts = ["api.legistorm.com"]
secrets = [{type = "http", name = "LEGISTORM_API_KEY", mode = "inject", inject_header = "X-Api-Key", hosts = ["api.legistorm.com"]}]
optional_secrets = ["LEGISTORM_ISSUES_ENDPOINT"]
