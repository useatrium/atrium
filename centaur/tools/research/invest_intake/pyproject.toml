[project]
name = "invest-intake"
description = "Normalize mixed raw invest inputs into a clean context pack"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
hosts = ["docs.google.com", "drive.google.com", "docsend.com"]
secrets = []

