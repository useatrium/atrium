name: CI

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

# Key the group by PR number (stable while the merge queue rebuilds the
# synthetic refs/pull/N/merge ref) and never cancel merge-queue runs —
# otherwise queue churn cancels healthy PR runs mid-flight (#409).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  ci_changes:
    name: Detect Surface CI changes
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      surface: ${{ steps.filter.outputs.surface }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: filter
        name: Detect changed paths
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "surface=true" >>"${GITHUB_OUTPUT}"
            exit 0
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${base}...HEAD")"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            git fetch --no-tags origin master:refs/remotes/origin/master
            changed_files="$(git diff --name-only origin/master...HEAD)"
          else
            base="${{ github.event.before }}"
            if [[ "$base" =~ ^0+$ ]]; then
              changed_files="$(git diff --name-only HEAD~1...HEAD)"
            else
              changed_files="$(git diff --name-only "${base}...HEAD")"
            fi
          fi

          if printf '%s\n' "${changed_files}" | grep -Eq \
            '^(surface/|infra/|\.github/workflows/ci\.yml$)'; then
            echo "surface=true" >>"${GITHUB_OUTPUT}"
          else
            echo "surface=false" >>"${GITHUB_OUTPUT}"
          fi

  surface-static:
    name: Surface static
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.surface == 'true'
    timeout-minutes: 12

    env:
      # The mobile typecheck regenerates Expo typed routes; keep the CLI off
      # the network.
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          # Must match the packageManager pin in surface/package.json (the
          # action fails on mismatch, which is the point — one pnpm line
          # everywhere, including Docker).
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: surface/pnpm-lock.yaml

      - name: Install surface workspace
        working-directory: surface
        run: pnpm install --frozen-lockfile

      - name: Lint surface workspace
        working-directory: surface
        timeout-minutes: 2
        run: pnpm lint

      - name: Lint mobile accessibility
        working-directory: surface
        timeout-minutes: 2
        run: pnpm --filter @atrium/mobile lint:a11y

      - name: Check surface migration filenames
        working-directory: surface
        timeout-minutes: 1
        run: pnpm check:migrations

      - name: Typecheck surface workspace
        working-directory: surface
        timeout-minutes: 4
        run: pnpm -r typecheck

      # centaur-client has no typecheck script — its tsc build IS its typecheck,
      # and pack/publish consumers (publishConfig) expect dist/ to compile.
      - name: Build centaur client
        working-directory: surface
        run: pnpm --filter @atrium/centaur-client build

      # Production web build: Caddy serves web/dist in prod but nothing else
      # exercises it (e2e uses the Vite dev server). The workspace typecheck
      # already ran above, so CI only needs the production bundle.
      - name: Build web production bundle
        working-directory: surface
        run: pnpm --filter @atrium/web build:ci

  surface-unit:
    name: Surface unit tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.surface == 'true'
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atrium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atrium -d atrium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://atrium:atrium@localhost:5432/atrium
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: surface/pnpm-lock.yaml

      - name: Install surface workspace
        working-directory: surface
        run: pnpm install --frozen-lockfile

      # The workspace root's test script recurses into packages, so exclude it
      # explicitly. Server tests are parallel-safe because each Vitest worker
      # gets its own Postgres database. --reporter-hide-prefix: pnpm's
      # "pkg test:" prefix stops GitHub from parsing ::warning/::error workflow
      # commands, which silently ate vitest's failure annotations and the flaky
      # reporter's warnings (annotations only parse at line start).
      - name: Test surface workspace
        working-directory: surface
        timeout-minutes: 6
        run: pnpm --filter '!atrium-surface' -r --reporter-hide-prefix test

  surface-e2e:
    name: Surface Playwright e2e
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.surface == 'true'
    # Must fit: ~2min setup + the e2e step budget below, with headroom. A
    # slow-runner suite that recovers through retries was killed at the old
    # 10min step budget twice in a row (2026-07-12) — a "green" suite that
    # dies mid-retry uploads no report and reads as a hard failure.
    timeout-minutes: 18
    # Run inside the official Playwright image: browsers + system deps are
    # pre-installed, so there is no flaky azureedge browser download (which
    # deterministically hung after the main artifact on GitHub runners). Tag
    # MUST track the pinned @playwright/test version in surface/e2e.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atrium
        options: >-
          --health-cmd "pg_isready -U atrium -d atrium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Inside a job container, service containers are reached by their label
      # hostname on the container port (not localhost:5433).
      DATABASE_URL: postgres://atrium:atrium@postgres:5432/atrium
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          # Must match the packageManager pin in surface/package.json (the
          # action fails on mismatch, which is the point — one pnpm line
          # everywhere, including Docker).
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: surface/pnpm-lock.yaml

      - name: Install surface workspace
        working-directory: surface
        run: pnpm install --frozen-lockfile

      # No browser-install step: the Playwright container already has Chromium.
      # Per-step timeout so a webServer/teardown hang is killed fast and
      # attributed, instead of silently eating the whole job budget. Sized so
      # a slow runner can absorb a few 60s test timeouts plus their retries:
      # the healthy suite runs ~5m, and a kill here discards the report.
      - name: Run Playwright e2e
        working-directory: surface
        timeout-minutes: 15
        shell: bash
        env:
          # playwright.config.ts reads E2E_DATABASE_URL for the webServer (it
          # falls back to a localhost:5433 default otherwise). db-reset.mjs
          # creates/truncates this dedicated DB using the atrium DB on the same
          # Postgres service as admin.
          E2E_DATABASE_URL: postgres://atrium:atrium@postgres:5432/atrium_e2e
          # Matches server/src/config.ts default; the in-step MinIO below.
          S3_ENDPOINT: http://127.0.0.1:9000
        run: |
          # Artifact write-back offloads blob bytes to S3, so the conflict e2e
          # needs object storage. Run the current MinIO in-step rather than as a
          # `services:` container: GitHub services can't supply minio/minio's
          # required `server` command, and bitnami's MinIO images were removed
          # from Docker Hub. Creds match config.ts defaults. The process is
          # reaped when the step's shell exits.
          curl -fsSLo "$RUNNER_TEMP/minio" https://dl.min.io/server/minio/release/linux-amd64/minio
          curl -fsSLo "$RUNNER_TEMP/mc" https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x "$RUNNER_TEMP/minio" "$RUNNER_TEMP/mc"
          MINIO_ROOT_USER=atrium MINIO_ROOT_PASSWORD=atrium-dev-secret \
            "$RUNNER_TEMP/minio" server "$RUNNER_TEMP/minio-data" --address ':9000' \
            > "$RUNNER_TEMP/minio.log" 2>&1 &
          for _ in $(seq 1 60); do
            curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && break
            sleep 1
          done
          "$RUNNER_TEMP/mc" alias set ci http://127.0.0.1:9000 atrium atrium-dev-secret
          "$RUNNER_TEMP/mc" mb --ignore-existing ci/atrium-files
          pnpm e2e

      # test-results/ holds per-test traces/screenshots as they are produced,
      # so unlike the HTML report (written only at suite end) it survives a
      # step-timeout kill — without it, a killed run uploads nothing at all.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            surface/e2e/playwright-report/
            surface/e2e/test-results/
          if-no-files-found: ignore

  surface:
    name: Surface
    runs-on: ubuntu-slim
    if: always()
    needs:
      - ci_changes
      - surface-static
      - surface-unit
      - surface-e2e
    timeout-minutes: 5
    steps:
      - name: Decide whether Surface jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: surface-static, surface-unit, surface-e2e
          jobs: ${{ toJSON(needs) }}
