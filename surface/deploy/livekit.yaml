# Sample production LiveKit config for Atrium voice calls.
# Copy this file for deployment and replace keys/domains before use.
#
# OVH tunnel topology:
# - Atrium app/file hosts stay behind Cloudflare Tunnel + local Caddy.
# - LiveKit runs direct on the host network.
# - LiveKit signaling may be exposed as HTTPS/WSS by Cloudflare Tunnel or another
#   reverse proxy forwarding to localhost:7880.
# - TURN/TLS on 443/tcp, TURN/UDP, ICE TCP fallback, and media are direct
#   host-network traffic. Do not send them through the HTTP Caddy tunnel.

# LiveKit API/WebSocket listener. Production clients should still use a trusted
# TLS signaling endpoint in LIVEKIT_URL, for example wss://livekit.example.com.
port: 7880

rtc:
  # Open this UDP range on the host firewall. Caddy cannot proxy it.
  port_range_start: 50000
  port_range_end: 60000
  # TCP fallback for restricted networks. Expose directly on the host.
  tcp_port: 7881
  use_external_ip: true

# Keys are injected via the LIVEKIT_KEYS env var (see docker-compose.prod.yml),
# sourced from the same LIVEKIT_API_KEY / LIVEKIT_API_SECRET the Fastify server
# signs tokens with — so signer and verifier can never disagree. Do NOT hardcode
# keys here.

turn:
  enabled: true
  # TURN/UDP. Open 3478/udp on the host.
  udp_port: 3478
  # TURN/TLS for restrictive networks. Signaling may be tunneled/reverse proxied,
  # but TURN/TLS on public 443/tcp must reach LiveKit directly on the host.
  tls_port: 443
  # Sample DNS-only hostname pointing at the host IP; must match the mounted cert
  # and the LIVEKIT_TURN_DOMAIN compose env used for /etc/letsencrypt/live.
  domain: turn.example.com
  cert_file: /etc/livekit/turn.crt
  key_file: /etc/livekit/turn.key
  relay_range_start: 50000
  relay_range_end: 60000
  ttl_seconds: 300

logging:
  level: info
