[package]
name = "absurd-sdk"
version = "0.4.0"
edition = "2021"
description = "Rust SDK for Absurd - PostgreSQL-based durable task execution"
readme = "README.md"
license = "Apache-2.0"
repository = "https://github.com/earendil-works/absurd"
keywords = ["absurd", "postgresql", "queue", "task", "durable"]
categories = ["asynchronous", "database"]

[lib]
name = "absurd"
path = "src/lib.rs"

[dependencies]
chrono = { version = "0.4", features = ["serde", "clock"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "postgres", "chrono", "json"] }
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
