packages:
  - server
  - shared
  - centaur-client
  - web
  - e2e
  - mobile
  - desktop

# pnpm's trust heuristic flags old-but-canonical packages (published before npm
# provenance existed) when a newer sibling version has provenance. These pinned
# legacy versions are well-known safe transitive deps (Babel/npm ecosystem).
trustPolicyExclude:
  - semver@6.3.1
  - semver@5.7.2
  - ua-parser-js@0.7.41
  # react-native-reanimated v4 peer; fresh release lacks provenance attestation (Expo SDK 56)
  - react-native-worklets@0.8.3
  # Expo SDK 56 Babel preset (pinned direct dep for babel.config.js); this patch lacks provenance
  - babel-preset-expo@56.0.14

# Only enforce the trust-downgrade policy on recently-published versions (where a
# supply-chain compromise would actually live — see minimumReleaseAge). Packages
# published longer ago than this are established/canonical, so exempt them: this
# stops pnpm's provenance heuristic from *intermittently* flagging old deps like
# semver@5.7.2 as "high-risk (possible takeover)" and blocking dependency adds,
# without weakening protection against fresh malicious releases. 30 days.
trustPolicyIgnoreAfter: 43200
