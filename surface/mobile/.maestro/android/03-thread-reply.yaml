appId: chat.atrium.app
name: Android thread reply
tags: [android, power-user]
---
- runFlow: authenticated-launch.yml
- tapOn: "general"
- extendedWaitUntil:
    visible: ".*Message #general.*"
    timeout: 10000
- tapOn: ".*Message #general.*"
- eraseText
- inputText: "Android Maestro verified thread probe"
- tapOn: "Send message"
- extendedWaitUntil:
    visible: "^Android Maestro verified thread probe$"
    timeout: 15000
- tapOn: ".*#general.*"
- longPressOn: "^Android Maestro verified thread probe$"
- tapOn: "Reply in thread"
- assertVisible: "Thread"
- tapOn: ".*Reply in thread.*"
- eraseText
- inputText: "Android Maestro reply verified"
- tapOn: "Send message"
- assertVisible: "^Android Maestro reply verified$"
- takeScreenshot: "android-thread-01-replied"
