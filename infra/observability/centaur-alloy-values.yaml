# Optional dogfood values for running Grafana Alloy beside Centaur in Kubernetes.
#
# Install with the Grafana Alloy Helm chart in the same cluster as Centaur and point
# logs at the Loki instance you operate for dogfood/prod. This is intentionally not
# embedded in Centaur's vendored upstream chart; keep fork/deployment-specific
# observability values in Atrium infra.
#
# Example:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm upgrade --install alloy grafana/alloy \
#     -n observability --create-namespace \
#     -f infra/observability/centaur-alloy-values.yaml

alloy:
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "centaur_pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "centaur|centaur-system"
          action        = "keep"
        }

        rule {
          target_label = "job"
          replacement  = "kubernetes-pods"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      loki.source.kubernetes "centaur_pods" {
        targets    = discovery.relabel.centaur_pods.output
        forward_to = [loki.relabel.low_cardinality.receiver]
      }

      loki.relabel "low_cardinality" {
        forward_to = [loki.write.local.receiver]

        rule {
          action = "labelkeep"
          regex  = "^(job|namespace|pod|container|app)$"
        }
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }
