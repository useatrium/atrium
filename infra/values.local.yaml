# Atrium Phase-0 overrides, layered after contrib/chart/values.dev.yaml.
# Env-mode secrets (no 1Password), no Slack, claude-code harness pointed at
# the in-cluster Anthropic mock.

secretManager:
  backend: env
  envPrefix: ""
  existingSecretName: centaur-infra-env

ironProxy:
  secretSource: env
  manager:
    secretSource: env

slackbot:
  enabled: false

# Broker requires a writable (1Password) backend; not used in Phase 0.
tokenBroker:
  enabled: false

sandbox:
  extraEnv:
    ANTHROPIC_BASE_URL: "http://centaur-llm-mock.centaur.svc.cluster.local:8081"
    NO_PROXY: "centaur-llm-mock.centaur.svc.cluster.local,centaur-llm-mock"
    DISABLE_TELEMETRY: "1"
    DISABLE_ERROR_REPORTING: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi
