[project]
name = "opentable"
description = "OpenTable CLI for searching restaurant reservations"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "browser-use>=0.11.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
opentable = "centaur_tool_opentable.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_opentable"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
hosts = ["www.opentable.com"]
secrets = []
