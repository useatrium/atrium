env_token:
  source_type: env
  config:
    var: GITHUB_TOKEN

aws_sm_db_password:
  source_type: aws_sm
  config:
    secret_id: arn:aws:secretsmanager:us-east-1:123456789012:secret:db-password
    region: us-east-1

aws_ssm_param:
  source_type: aws_ssm
  config:
    name: /prod/app/api_key
    with_decryption: true

onepassword_api_key:
  source_type: 1password
  config:
    secret_ref: op://prod/api/credential

onepassword_connect_token:
  source_type: 1password_connect
  config:
    secret_ref: op://prod/api/credential
    host_env: OP_CONNECT_HOST
    token_env: OP_CONNECT_TOKEN

broker_token:
  source_type: token_broker
  config:
    credential_id: managed-gmail
    credential_namespace: acme
  static_secret: acme_managed_gmail_secret

# Keyfile source for the acme_gcs_keyfile gcp_auth secret.
gcp_keyfile:
  source_type: env
  config:
    var: GCP_SA_KEYFILE
  gcp_auth_secret: acme_gcs_keyfile

# Service-account keyfile source for the acme_cloud_run gcp_id_token secret.
gcp_id_token_keyfile:
  source_type: env
  config:
    var: CLOUD_RUN_SA_KEYFILE
  gcp_id_token_secret: acme_cloud_run

# Credential fields for the acme_gmail_oauth oauth_token secret.
oauth_gmail_refresh:
  source_type: 1password
  config:
    secret_ref: op://eng/gmail/refresh-token
  oauth_token_secret: acme_gmail_oauth
  role: refresh_token
  role_kind: credential_field

oauth_gmail_client_id:
  source_type: env
  config:
    var: GMAIL_CLIENT_ID
  oauth_token_secret: acme_gmail_oauth
  role: client_id
  role_kind: credential_field

# HMAC key source for the acme_webhook_hmac hmac_sign secret.
hmac_webhook_secret:
  source_type: env
  config:
    var: WEBHOOK_HMAC_KEY
  hmac_secret: acme_webhook_hmac
  role: secret
  role_kind: credential_field

# Upstream DSN sources for the pg_dsn secrets.
pg_analytics_dsn:
  source_type: env
  config:
    var: PG_ANALYTICS_DSN
  pg_dsn_secret: acme_analytics_pg

pg_reporting_dsn:
  source_type: aws_sm
  config:
    secret_id: arn:aws:secretsmanager:us-east-1:123456789012:secret:pg-reporting-dsn
  pg_dsn_secret: acme_reporting_pg
# AWS SigV4 credential sources for the aws_auth secret (role-discriminated, like hmac/oauth).
aws_cloudwatch_access_key:
  source_type: env
  config:
    var: AWS_ACCESS_KEY_ID
  aws_auth_secret: acme_cloudwatch_aws
  role: access_key_id
  role_kind: credential_field

aws_cloudwatch_secret_key:
  source_type: env
  config:
    var: AWS_SECRET_ACCESS_KEY
  aws_auth_secret: acme_cloudwatch_aws
  role: secret_access_key
  role_kind: credential_field
