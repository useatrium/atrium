[project]
name = "docsend"
description = "DocSend document downloader — cloud browser + Playwright"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "browser-use-sdk>=2.0.14",
    "httpx>=0.28.0",
    "pillow>=12.0.0",
    "playwright>=1.50.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "BROWSER_USE_API_KEY", match_query = true, hosts = ["connect.browser-use.com"]}]
