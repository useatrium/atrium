acme_bigquery:
  namespace: acme
  foreign_id: gcp-bigquery
  name: bigquery
  labels:
    team: data
  credentials_provider:
    type: workload_identity
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  created_by: acme_admin

# Keyfile mode; its keyfile source lives in secret_sources.yml (gcp_keyfile).
acme_gcs_keyfile:
  namespace: acme
  foreign_id: gcp-gcs
  name: gcs
  labels: {}
  subject: storage-bot@acme.example
  scopes:
    - https://www.googleapis.com/auth/devstorage.read_only
  created_by: acme_admin
