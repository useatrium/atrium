[project]
name = "gsuite"
description = "Gmail, Calendar, Drive, Docs, Sheets, Slides, Analytics"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "google-api-python-client>=2.100.0",
    "google-analytics-data>=0.18.0",
    "google-analytics-admin>=0.22.0",
    "google-auth-httplib2>=0.2.0",
    "google-auth-oauthlib>=1.2.0",
    "httplib2>=0.20.0",
    # PySocks (imported as ``socks``) is what enables httplib2 proxy support;
    # without it httplib2 silently ignores the proxy. See client._build_http.
    "pysocks>=1.7.1",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
gsuite = "centaur_tool_gsuite.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_gsuite"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
hosts = [
    "gmail.googleapis.com",
    "calendar.googleapis.com",
    "www.googleapis.com",
    "docs.googleapis.com",
    "sheets.googleapis.com",
    "slides.googleapis.com",
    "analyticsdata.googleapis.com",
]
# Authentication is minted by iron-proxy's oauth_token transform. The
# refresh_token grant exchanges the GOOGLE_TOKEN_JSON authorized-user
# credential against token_endpoint for a short-lived access token. The
# credential's refresh_token, client_id and client_secret are each pulled
# from that one JSON secret via json_key. No scopes are declared: the
# refresh_token grant returns a token with the scopes the credential was
# originally consented for.
secrets = [
    { type = "oauth_token", grant = "refresh_token", name = "GOOGLE_TOKEN_JSON", token_endpoint = "https://oauth2.googleapis.com/token", hosts = [
        "gmail.googleapis.com",
        "calendar.googleapis.com",
        "www.googleapis.com",
        "docs.googleapis.com",
        "sheets.googleapis.com",
        "slides.googleapis.com",
        "analyticsdata.googleapis.com",
    ], fields = { refresh_token = { secret_ref = "GOOGLE_TOKEN_JSON", json_key = "refresh_token" }, client_id = { secret_ref = "GOOGLE_TOKEN_JSON", json_key = "client_id" }, client_secret = { secret_ref = "GOOGLE_TOKEN_JSON", json_key = "client_secret" } } },
]
