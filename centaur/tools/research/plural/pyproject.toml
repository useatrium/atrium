[project]
name = "plural"
description = "Plural (Open States) API — state legislation, legislators, committees, and events"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
plural = "centaur_tool_plural.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_plural"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "PLURAL_API_KEY", mode = "inject", inject_header = "X-API-KEY", hosts = ["v3.openstates.org"]}]
