name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/docs.yml
      - docs/**
  push:
    branches: [main]
    paths:
      - .github/workflows/docs.yml
      - docs/**
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  build-and-deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        worker:
          - name: docs
            directory: docs
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Skip Cloudflare deploy
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "Cloudflare credentials are not configured; docs build completed without deployment."

      - name: Deploy
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.worker.directory }}

      - name: Preview
        id: preview
        if: ${{ github.event_name == 'pull_request' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.worker.directory }}
          command: versions upload

      - name: Publish preview summary
        if: ${{ github.event_name == 'pull_request' && steps.preview.outputs.deployment-url != '' }}
        env:
          DEPLOYMENT_URL: ${{ steps.preview.outputs.deployment-url }}
        run: |
          {
            echo "### Cloudflare Workers docs preview"
            echo
            echo "$DEPLOYMENT_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preview URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: deploy-${{ matrix.worker.name }}
          message: |
            | Worker | Preview |
            |--------|---------|
            | ${{ matrix.worker.name }} | ${{ steps.preview.outputs.deployment-url }} |
