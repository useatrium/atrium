[project]
name = "invest-intake"
description = "Normalize mixed raw invest inputs into a clean context pack"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.scripts]
invest-intake = "centaur_tool_invest_intake.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_invest_intake"

[tool.centaur]
module = "client.py"
hosts = ["docs.google.com", "drive.google.com", "docsend.com"]
secrets = []
