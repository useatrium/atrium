proxy:
  # Codex compaction calls can legitimately take longer than iron-proxy's
  # default 30s response-header timeout. Keep model-provider calls from being
  # cut off while OpenAI is still computing the first response byte.
  upstream_response_header_timeout: "120s"

transforms:
  - name: secrets
    config:
      secrets:
        - replace:
            proxy_value: XAI_API_KEY
            match_headers: ["Authorization"]
          rules: [{ host: api.x.ai }]
        - replace:
            proxy_value: GEMINI_API_KEY
            match_headers: ["X-Goog-Api-Key"]
          rules: [{ host: generativelanguage.googleapis.com }]
        - replace:
            proxy_value: AMP_API_KEY
            match_headers: ["Authorization"]
          rules: [{ host: ampcode.com }]
        - replace:
            proxy_value: SLACK_BOT_TOKEN
            match_headers: ["Authorization"]
          rules: [{ host: "*.slack.com" }]
  - name: header_allowlist
    config:
      headers:
        - "host"
        - "content-type"
        - "content-length"
        - "content-encoding"
        - "accept"
        - "accept-encoding"
        - "accept-language"
        - "authorization"
        - "jwt"
        - "anthropic-version"
        - "anthropic-beta"
        - "openai-organization"
        - "openai-project"
        - "chatgpt-account-id"
        - "x-request-id"
        - "x-stainless-arch"
        - "x-stainless-os"
        - "x-stainless-lang"
        - "x-stainless-runtime"
        - "x-stainless-runtime-version"
        - "x-stainless-package-version"
        - "x-stainless-retry-count"
        - "connection"
        - "transfer-encoding"
        - "te"
        - "upgrade"
        - "sec-websocket-key"
        - "sec-websocket-version"
        - "sec-websocket-protocol"
        - "sec-websocket-extensions"
        - "cache-control"
        - "pragma"
        - "if-none-match"
        - "if-modified-since"
        - "range"
        - "cookie"
        - "notion-version"
        - "api-version"
        - "x-github-api-version"
        - "api-key"
        - "apikey"
        - "accesskey"
        - "api-access-key"
        - "api-signature"
        - "api-timestamp"
        - "project-access-token"
        - "fx-access-key"
        - "fx-access-sign"
        - "fx-access-timestamp"
        - "fx-access-passphrase"
        - "x-cb-access-passphrase"
        - "x-cb-access-signature"
        - "x-cb-access-timestamp"
        - "addepar-firm"
        - "clientid"
        - "x-as-user-email"
        - "/^x-codex-.*$/"
        - "/^x-openai-.*$/"
        - "/^x-amz-.*$/"
        - "/^amz-sdk-.*$/"
        - "/^x-amzn-.*$/"
        - "/^x-[a-z0-9-]*(api-key|apikey|secret|token|auth|key)$/"
