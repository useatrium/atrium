[project]
name = "atrium-preview"
description = "Create and manage Atrium branch preview environments"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27.0", "typer>=0.12.0", "rich>=13.0.0"]

[project.scripts]
atrium-preview = "centaur_tool_atrium_preview.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_atrium_preview"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
hosts = ["atrium-preview-launcher.garybasin.com"]
secrets = [
    {type = "http", name = "ATRIUM_PREVIEW_LAUNCHER_TOKEN", mode = "inject", inject_header = "Authorization", inject_formatter = "Bearer {{ .Value }}", hosts = ["atrium-preview-launcher.garybasin.com"]},
]
