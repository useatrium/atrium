appId: chat.atrium.app
---
- tapOn: "Files"
- extendedWaitUntil:
    visible: "Search files"
    timeout: 10000
- takeScreenshot: "${SCREENSHOT_PREFIX}-02-files"
# Match the exact native tab label so the Files empty-state copy cannot win.
- tapOn: "^Agents$"
- extendedWaitUntil:
    visible: "Run a demo agent|Recent|Archived"
    timeout: 10000
- takeScreenshot: "${SCREENSHOT_PREFIX}-03-agents"
- tapOn:
    text: ".*Attention.*"
- extendedWaitUntil:
    visible: "You're all caught up|Attention"
    timeout: 10000
- assertNotVisible: ".*running.*"
- takeScreenshot: "${SCREENSHOT_PREFIX}-04-attention"
- tapOn: "Search"
- assertVisible: "Search messages"
- inputText: "maestro-no-match"
- extendedWaitUntil:
    visible: "No results."
    timeout: 10000
- takeScreenshot: "${SCREENSHOT_PREFIX}-05-search-empty"
- eraseText
- hideKeyboard
- tapOn: "Chat"
- assertVisible: "Chat"
