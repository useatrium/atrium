[project]
name = "demo"
version = "0.1.0"
description = "Demo tool for testing CD hot-reload"
dependencies = [
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.scripts]
demo = "centaur_tool_demo.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_demo"

[tool.centaur]
module = "client.py"
hosts = []
secrets = []
