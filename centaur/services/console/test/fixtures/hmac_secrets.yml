# HMAC key source and rules live in secret_sources.yml / request_rules.yml.
acme_webhook_hmac:
  namespace: acme
  foreign_id: hmac-webhook
  name: webhook-signer
  labels:
    team: payments
  timestamp_format: unix_seconds
  signature_algorithm: sha256
  signature_key_encoding: hex
  signature_output_encoding: base64
  signature_message: "{{ .Timestamp }}.{{ .Body }}"
  headers:
    - name: X-Signature
      value: "{{ .Signature }}"
    - name: X-Timestamp
      value: "{{ .Timestamp }}"
  allow_chunked_body: false
  created_by: acme_admin
