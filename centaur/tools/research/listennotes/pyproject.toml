[project]
name = "listennotes"
description = "Listen Notes CLI for podcast data"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
listennotes = "centaur_tool_listennotes.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_listennotes"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "LISTENNOTES_KEY", mode = "inject", inject_header = "X-ListenAPI-Key", hosts = ["listen-api.listennotes.com"]}]
