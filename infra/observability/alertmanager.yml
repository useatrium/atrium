route:
  receiver: ntfy
  group_by: ["alertname", "job"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # alertmanager-ntfy bridge (same compose file) forwards alerts as ntfy.sh
  # push notifications. It stays outside Atrium so app outages can still
  # alert. The ntfy topic is the credential: it lives ONLY in the untracked
  # infra/observability/alertmanager-ntfy.yaml on the box (this repo is
  # public) — see alertmanager-ntfy.example.yaml.
  - name: ntfy
    webhook_configs:
      - url: http://alertmanager-ntfy:8000/hook
        send_resolved: true
