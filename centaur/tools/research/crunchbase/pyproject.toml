[project]
name = "crunchbase"
description = "Crunchbase Enterprise API CLI for company and funding data"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
crunchbase = "centaur_tool_crunchbase.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_crunchbase"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "CRUNCHBASE_API_KEY", mode = "inject", inject_header = "X-cb-user-key", hosts = ["api.crunchbase.com"]}]
