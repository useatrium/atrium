{{- $console := include "centaur.consoleValues" . | fromYaml }}
{{- if and $console.enabled $console.worker.enabled }}
{{- $secretEnv := include "centaur.secretEnvName" . }}
{{- $prefix := .Values.secretManager.envPrefix }}
{{- $apiRsName := include "centaur.componentName" (dict "root" . "component" "api-rs") }}
{{- $mcpPublicUrl := default .Values.slackbotv2.mcpPublicUrl .Values.apiRs.mcpPublicUrl }}
# console background job worker — runs Solid Queue (`bin/jobs`) so
# console's enqueued jobs actually execute. The most important of these is
# the broker-credential OAuth refresh loop, which mints and refreshes the access
# tokens delivered inline via `token_broker` sources (e.g. the `openai-codex`
# brokered token); the web (Puma) pod runs no worker, so without this those jobs
# never run. The web Deployment owns database setup (create-db init + the image's
# Rails db:prepare on boot), so this worker only processes jobs and waits for the
# Solid Queue database to exist before starting.
#
# It shares the web image and the same infra-Secret env (DB URL, ActiveRecord
# encryption keys, SECRET_KEY_BASE) so it can decrypt stored credentials. It uses
# its own `console-worker` component label so it is NOT selected by the
# console Service (which load-balances HTTP to the web pods).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "console-worker") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "console-worker") | nindent 4 }}
spec:
  replicas: {{ $console.worker.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console-worker") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console-worker") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Wait for the Solid Queue database (created by the web pod's Rails
        # db:prepare) so a cold start does not crash-loop before it exists.
        # Read-only and idempotent; connects as the admin (ai_v2) DSN.
        - name: wait-for-queue-db
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              until [ "$(psql "$ADMIN_DATABASE_URL" -tAc \
                "SELECT 1 FROM pg_database WHERE datname = '$QUEUE_DB_NAME'")" = "1" ]; do
                echo "waiting for database $QUEUE_DB_NAME to exist…"
                sleep 2
              done
          env:
            - name: ADMIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sDATABASE_URL" $prefix }}
            # Rails 8 names the Solid Queue database "<primary>_queue".
            - name: QUEUE_DB_NAME
              value: {{ printf "%s_queue" $console.database.name | quote }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: console-worker
          image: {{ printf "%s:%s" $console.image.repository $console.image.tag | quote }}
          imagePullPolicy: {{ $console.image.pullPolicy }}
          # Solid Queue supervisor. Claims and runs jobs from the
          # <primary>_queue database; serves no HTTP.
          command:
            - bin/jobs
          env:
            # Same secretKeyRefs as the web container so the worker can reach
            # Postgres and decrypt stored credentials. No PORT / static-file
            # serving — this process serves no HTTP.
            - name: IRON_CONTROL_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_DATABASE_URL" $prefix }}
            - name: CENTAUR_CONSOLE_CENTAUR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sDATABASE_URL" $prefix }}
            - name: IRON_CONTROL_INITIAL_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_INITIAL_USER_EMAIL" $prefix }}
            - name: IRON_CONTROL_INITIAL_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_INITIAL_USER_PASSWORD" $prefix }}
            - name: IRON_CONTROL_INITIAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_INITIAL_API_KEY" $prefix }}
            - name: IRON_CONTROL_AR_ENCRYPTION_PRIMARY_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_AR_ENCRYPTION_PRIMARY_KEY" $prefix }}
            - name: IRON_CONTROL_AR_ENCRYPTION_DETERMINISTIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_AR_ENCRYPTION_DETERMINISTIC_KEY" $prefix }}
            - name: IRON_CONTROL_AR_ENCRYPTION_KEY_DERIVATION_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_AR_ENCRYPTION_KEY_DERIVATION_SALT" $prefix }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_SECRET_KEY_BASE" $prefix }}
            - name: CENTAUR_JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sCENTAUR_JWT_SIGNING_SECRET" $prefix }}
{{- if $console.publicUrl }}
            - name: CENTAUR_CONSOLE_PUBLIC_URL
              value: {{ $console.publicUrl | quote }}
{{- end }}
{{- if $mcpPublicUrl }}
            - name: CENTAUR_MCP_PUBLIC_URL
              value: {{ $mcpPublicUrl | quote }}
{{- end }}
{{- if $console.googleOauth.enabled }}
            # Google OAuth app credentials, needed by the broker-credential
            # OAuth refresh loop. Gated on console.googleOauth.enabled.
            - name: IRON_CONTROL_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_GOOGLE_CLIENT_ID" $prefix }}
            - name: IRON_CONTROL_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_GOOGLE_CLIENT_SECRET" $prefix }}
{{- end }}
            - name: RAILS_ENV
              value: {{ $console.railsEnv | quote }}
{{- with $console.slackDmSync.oauthAppSlug }}
            - name: CENTAUR_CONSOLE_SLACK_DM_SYNC_OAUTH_APP_SLUG
              value: {{ . | quote }}
{{- end }}
            - name: RAILS_LOG_TO_STDOUT
              value: "1"
{{- if .Values.apiRs.enabled }}
            - name: CENTAUR_CONSOLE_CENTAUR_API_URL
              value: {{ printf "http://%s:%v" $apiRsName .Values.apiRs.port | quote }}
{{- end }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
            # No readOnlyRootFilesystem — Rails writes to tmp/ at runtime.
            seccompProfile:
              type: RuntimeDefault
          resources:
{{ toYaml $console.worker.resources | nindent 12 }}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "console-worker") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "console-worker") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console-worker") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # No ingress rules: the worker serves no traffic, so all inbound is denied.
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
{{- if .Values.apiRs.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.apiRs.port }}
{{- end }}
    # Outbound HTTPS to OAuth token endpoints for the broker refresh loop.
    - ports:
        - protocol: TCP
          port: 443
    # DNS egress is provided by the namespace-wide allow-dns policy.
{{- end }}
{{- end }}
