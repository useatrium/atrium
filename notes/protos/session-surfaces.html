<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atrium · session surfaces — IA comparison</title>
<style>
  :root{
    /* neutrals tinted cool toward the atrium indigo brand hue (no pure #fff/#000) */
    --bg:#fdfdfe;--ink:#1b1a23;--ink-2:#45434f;--ink-3:#6a6878;--ink-4:#9795a6;--ink-5:#c5c3d0;
    --line:#f0eff4;--line-2:#e6e4ec;--line-3:#d9d6e1;--fill:#f5f4f9;
    /* accent = atrium indigo */
    --blue:#4f46e5;--blue-ink:#4036c9;--green:#1f9d57;--amber:#b9810c;--red:#cf3b3b;
    --add-bg:#f1faf4;--add-fg:#1c7a45;--del-bg:#fdf2f2;--del-fg:#b23636;
    --accent-soft:#eef0fe;
  }
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:#ebe9f1;color:var(--ink-2);font:14px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}
  button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}.hidden{display:none!important}

  .controls{position:sticky;top:0;z-index:60;display:flex;flex-wrap:wrap;gap:18px;align-items:center;
    padding:9px 18px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-2)}
  .grp{display:flex;align-items:center;gap:7px}
  .grp .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-4)}
  .seg{display:flex;background:var(--fill);border:1px solid var(--line-2);border-radius:8px;padding:2px}
  .seg button{padding:4px 11px;border-radius:6px;color:var(--ink-3);font-size:12px;font-weight:500;white-space:nowrap}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .seg button:not(.on):hover{color:var(--ink)}
  .hint{margin-left:auto;font-size:11.5px;color:var(--ink-4);max-width:40ch;text-align:right}

  .stage{display:flex;justify-content:center;padding:22px}
  .frame{width:min(1500px,96vw);height:calc(100vh - 96px);background:var(--bg);border:1px solid var(--line-2);border-radius:14px;
    overflow:hidden;display:flex;box-shadow:0 18px 50px -20px rgba(20,20,40,.3)}
  .nav{width:50px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:11px 0;gap:9px}
  .logo{width:26px;height:26px;border-radius:7px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px}
  .nv{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-4);font-size:14px}.nv.on{color:var(--ink)}

  .session{flex:1;min-width:0;display:flex;flex-direction:column;position:relative}
  .sess-h{height:50px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--line)}
  .sess-h .ti{font-weight:600;font-size:15px;letter-spacing:-.01em;flex:1;min-width:0;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sess-h .crumb{font-size:12.5px;color:var(--ink-3);font-weight:500;padding:4px 9px;border-radius:7px;flex-shrink:0;margin-left:-4px}
  .sess-h .crumb:hover{background:var(--fill);color:var(--ink)}
  .live{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 0 rgba(79,70,229,.5);animation:pulse 2s infinite}
  /* presence: avatar stack, driver ringed (replaces the busy "You drive · 4 watching" line) */
  .who{display:flex;align-items:center;flex-shrink:0;cursor:default}
  .av{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:600;color:#fff;background:var(--ink-4);border:2px solid var(--bg);margin-left:-7px}
  .av:first-child{margin-left:0}
  .av.seat{background:var(--blue);z-index:2} /* color marks the driver; watchers stay quiet/neutral */
  .av.more{background:var(--fill);color:var(--ink-3)}
  /* window chrome (expand/collapse + close) grouped + fenced off from status/actions */
  .chrome{display:flex;align-items:center;gap:2px;margin-left:5px;padding-left:9px;border-left:1px solid var(--line);flex-shrink:0}
  @keyframes pulse{70%{box-shadow:0 0 0 6px rgba(79,70,229,0)}100%{box-shadow:0 0 0 0 rgba(79,70,229,0)}}
  .envchip{display:flex;align-items:center;gap:5px;font-size:11.5px;padding:2px 9px;border-radius:999px;border:1px solid var(--line-2);color:var(--ink-3);flex-shrink:0}
  .envchip .d{width:6px;height:6px;border-radius:50%}
  .envchip.warm .d{background:var(--green)} .envchip.warm{color:var(--green)}
  .envchip.sleeping .d{background:var(--ink-4)}
  .envchip.expired{color:var(--red);border-color:#f0d6d6} .envchip.expired .d{background:var(--red)}
  .sp{margin-left:auto}
  .ib{width:28px;height:28px;border-radius:7px;color:var(--ink-3);display:grid;place-items:center}.ib:hover{background:var(--fill);color:var(--ink-2)}
  .stopbtn{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--red);border:1px solid #ecc9c9;border-radius:8px;padding:4px 11px;flex-shrink:0}
  .stopbtn:hover{background:var(--del-bg)}
  .live.off,.ld.off{background:var(--ink-4);animation:none;box-shadow:none}
  .live-line.stopped{color:var(--ink-4)}
  /* steering area owns the agent's live state + model/thinking + container info */
  .agbar{position:relative;display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .agstate{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3)}.agstate.off{color:var(--ink-4)}
  /* live state IS the stop button: shows "Working", reveals "Stop" on hover (one control, not two) */
  .agrun{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3);border:1px solid transparent;border-radius:8px;padding:3px 10px}
  .agrun .lbl-stop{display:none}
  .agrun:hover{color:var(--red);background:var(--del-bg);border-color:#ecc9c9}
  .agrun:hover .lbl-run{display:none}.agrun:hover .lbl-stop{display:inline}
  .agrun:hover .ld{background:var(--red);border-radius:2px;animation:none;box-shadow:none}
  .agmodel{font-size:11.5px;color:var(--ink-3);border:1px solid var(--line-2);border-radius:8px;padding:3px 10px}
  .agmodel:hover{border-color:var(--line-3);color:var(--ink-2)}.agmodel b{color:var(--ink-2);font-weight:600}
  .aginfo{width:20px;height:20px;border-radius:50%;border:1px solid var(--line-3);color:var(--ink-4);display:grid;place-items:center;font-size:12px;font-style:italic;font-weight:700;font-family:Georgia,"Times New Roman",serif;line-height:1}
  .aginfo:hover{border-color:var(--ink-4);color:var(--ink-2)}
  .setup-pop{position:absolute;bottom:100%;left:0;margin-bottom:8px;min-width:226px;background:var(--bg);border:1px solid var(--line-2);border-radius:11px;box-shadow:0 16px 44px -14px rgba(20,20,40,.34);padding:5px;z-index:42}
  .sp-sec{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);padding:7px 10px 3px}
  .sp-row{display:flex;align-items:center;gap:8px;width:100%;text-align:left;font-size:12.5px;color:var(--ink-2);padding:6px 10px;border-radius:7px}
  .sp-row:hover{background:var(--fill)}.sp-row .ck{margin-left:auto;color:var(--blue)}
  .sp-meta{font-size:12px;color:var(--ink-3);padding:2px 10px 4px}.sp-note{font-size:11px;color:var(--ink-4);padding:6px 10px 3px}
  /* actionable seat hand-off (shown only when someone wants the seat) */
  .seatreq{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);background:var(--accent-soft);border:1px solid #d8d6ee;border-radius:9px;padding:6px 11px;margin-bottom:9px}
  .seatreq b{color:var(--ink);font-weight:600}.seatreq .d2{color:var(--ink-4)}
  .seatreq .g{margin-left:auto;font-size:11px;font-weight:600;color:#fff;background:var(--blue);border-radius:6px;padding:3px 11px}
  .seatreq .xd{font-size:12px;color:var(--ink-4)}.seatreq .xd:hover{color:var(--ink-2)}
  /* hover toolbar + context menu + reactions (Slack/Discord-style) */
  .beat,.cmsg{position:relative}
  .msgbar{position:absolute;top:-14px;right:10px;display:flex;gap:1px;background:var(--bg);border:1px solid var(--line-2);border-radius:9px;box-shadow:0 2px 10px rgba(20,20,40,.12);padding:2px;opacity:0;pointer-events:none;transition:opacity .1s;z-index:25}
  .beat:hover>.msgbar,.resp:hover>.msgbar,.cmsg:hover>.msgbar,
  .beat.act>.msgbar,.resp.act>.msgbar,.cmsg.act>.msgbar{opacity:1;pointer-events:auto}
  /* the line acknowledges the pointer — and stays lit while its menu is open (Slack-style) */
  .read .beat,.read .resp{border-radius:9px;transition:background .12s,box-shadow .12s}
  .read .beat:hover,.read .resp:hover,.read .beat.act,.read .resp.act{background:var(--fill);box-shadow:0 0 0 5px var(--fill)}
  .cmsg{transition:background .12s}.cmsg:hover,.cmsg.act{background:var(--fill)}
  .mb{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;font-size:13px;color:var(--ink-3)}.mb:hover{background:var(--fill);color:var(--ink)}
  .ic{width:15px;height:15px;display:block;flex-shrink:0}.ib .ic{width:16px;height:16px}
  .ctx-scrim{position:fixed;inset:0;z-index:40}
  .ctxmenu{position:fixed;z-index:41;min-width:204px;background:var(--bg);border:1px solid var(--line-2);border-radius:11px;box-shadow:0 16px 44px -14px rgba(20,20,40,.34);padding:5px}
  .cm-item{display:block;width:100%;text-align:left;font-size:13px;color:var(--ink-2);padding:7px 11px;border-radius:7px}
  .cm-item:hover{background:var(--fill);color:var(--ink)}
  .cm-item.cm-danger{color:var(--red)}.cm-item.cm-danger:hover{background:var(--del-bg)}
  .cm-sep{height:1px;background:var(--line);margin:5px 6px}
  .rxn{display:inline-flex;align-items:center;gap:4px;margin:7px 0 0 15px;font-size:12px;color:var(--ink-2);background:var(--accent-soft);border:1px solid #d8d6ee;border-radius:999px;padding:1px 9px;cursor:pointer}

  .body{flex:1;min-height:0;display:flex;position:relative}
  .scroll{overflow:auto}
  .scroll::-webkit-scrollbar{width:10px}.scroll::-webkit-scrollbar-thumb{background:var(--line-3);border-radius:8px;border:3px solid var(--bg)}

  /* transcript */
  .read{flex:1;min-width:0;overflow:auto}
  .col{max-width:600px;margin:0 auto;padding:22px 24px 90px}
  .beat{margin-top:30px}.tblk:first-child .beat{margin-top:2px} /* only the very first turn hugs the top; every other turn gets real air */
  .nm{font-weight:600;color:var(--ink);margin-bottom:1px}.say{color:var(--ink)}
  .nm .tm{font-weight:400;color:var(--ink-4);font-size:11.5px;margin-left:6px}
  .resp{color:var(--ink-2);margin-top:9px;padding-left:15px}
  .tg{color:var(--ink-3);text-align:left}.tg:hover{color:var(--ink-2)}.tg .dim{color:var(--ink-4)}
  .tg.static{cursor:default}.tg.static:hover{color:var(--ink-3)}
  .tg.err{color:var(--del-fg)}
  /* edit lines show the file + real coloured +/- counts (makes the agent's actions concrete) */
  .tg .ef{color:var(--ink-2)}.tg .cadd{color:var(--add-fg);font-weight:500}.tg .cdel{color:var(--del-fg);font-weight:500}
  /* artifact produced by a step → an inline chip, opens the gallery */
  .madeline{margin-top:6px;padding-left:15px}
  .artchip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-2);border-radius:9px;padding:4px 10px 4px 4px;font-size:11.5px;color:var(--ink-2);cursor:pointer}
  .artchip:hover{border-color:var(--line-3);background:var(--fill)}
  .artchip .ax{width:24px;height:24px;border-radius:6px;background:var(--fill);display:grid;place-items:center;font-size:8.5px;font-weight:700;letter-spacing:.04em;color:var(--ink-4)}
  .artchip .an2{font-weight:500;color:var(--ink)}.artchip .am2{color:var(--ink-4)}
  .tout{margin-top:6px;padding:7px 11px;background:var(--fill);border-radius:8px;color:var(--ink-3);font-size:12px;white-space:pre-wrap}
  .nm .spawn{font-weight:400;color:var(--ink-4);font-size:11.5px;margin-left:8px}
  .nm .spawn b{color:var(--ink-3);font-weight:600}
  .live-line{display:flex;align-items:center;gap:8px;color:var(--ink-3);margin-top:9px;padding-left:15px}
  .ld{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}

  /* inline work-product cards */
  .card{margin:10px 0 4px;border:1px solid var(--line-2);border-radius:11px;overflow:hidden}
  .card .ch{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer}
  .card .ch:hover{background:var(--fill)}
  .card .ch .ci{width:22px;height:22px;border-radius:6px;background:var(--fill);display:grid;place-items:center;font-size:12px;flex-shrink:0}
  .card .ch .ct{font-weight:600;color:var(--ink);flex:1;min-width:0}
  .card .ch .cm{font-size:11.5px;color:var(--ink-4)}
  .card .ch .go{font-size:11.5px;color:var(--blue);font-weight:600}
  .sideline{display:flex;align-items:center;gap:9px;margin-top:11px;padding-left:15px;font-size:13px;color:var(--ink-2)}
  .sideline .si{color:var(--ink-3)}.sideline b{color:var(--ink)}
  .gate{display:flex;align-items:center;gap:10px;margin:12px 0 4px 15px;padding:10px 13px;border:1px solid #efdcb4;border-radius:11px;background:#fdfaf2}
  .gate .gi{color:var(--amber);font-size:14px;flex-shrink:0}
  .gate .gate-t{flex:1;color:var(--ink)}.gate .gate-t b{font-weight:600}
  .badge{font-size:10px;font-weight:600;border-radius:5px;padding:1px 6px;border:1px solid var(--line-2);color:var(--ink-3)}
  .badge.ok{color:var(--green);border-color:#cfe9da}.badge.wait{color:var(--amber);border-color:#eee0bf}

  .gallery-inline{display:flex;gap:10px;margin-top:10px;padding-left:15px;flex-wrap:wrap}
  .acard{width:150px;border:1px solid var(--line-2);border-radius:10px;overflow:hidden;cursor:pointer}
  .acard:hover{border-color:var(--line-3)}
  .acard .thumb{height:84px;background:linear-gradient(135deg,#ededf1,#f7f7f9);display:grid;place-items:center;color:var(--ink-4);font-size:20px}
  .acard .an{padding:6px 8px;font-size:11.5px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acard .am{padding:0 8px 7px;font-size:10.5px;color:var(--ink-4)}
  .acard .thumb .ext{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--ink-4)}
  /* gated side-effect approve/deny */
  .aact{display:inline-flex;gap:6px;align-items:center;flex-shrink:0;margin-left:4px}
  .aact button{font-size:11px;font-weight:600;border-radius:6px;padding:3px 10px;border:1px solid var(--line-2);color:var(--ink-3)}
  .aact .approve{color:var(--ink);border-color:var(--ink-3)}.aact .approve:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .aact .deny:hover{color:var(--ink-2)}
  .arow .aact{margin-right:10px}

  /* contents handle (tick lines) */
  .toc{position:absolute;right:12px;top:50%;transform:translateY(-50%);z-index:30}
  .toc-lines{display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding:8px 6px;cursor:pointer}
  .tl{width:14px;height:2px;border-radius:2px;background:var(--ink-4);opacity:.5}.toc-lines:hover .tl{opacity:.8}
  .tl.on{background:var(--ink);opacity:1;width:17px}.tl.run{background:var(--blue);opacity:1}
  .toc-menu{position:absolute;right:100%;top:50%;padding-right:9px;width:230px;opacity:0;pointer-events:none;
    transform:translateY(-50%) translateX(10px);transition:.15s;z-index:40}
  .toc:hover .toc-menu,.toc.open .toc-menu{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0)}
  .toc.open .toc-lines .tl{opacity:.9}
  .toc-card{background:#fff;border:1px solid var(--line-2);border-radius:11px;box-shadow:0 16px 44px -16px rgba(20,20,40,.3);padding:5px;max-height:360px;overflow:auto}
  .toc-card .tt{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);padding:6px 9px 3px}
  .frow{display:flex;gap:8px;align-items:center;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--ink)}
  .frow:hover{background:var(--fill)}.frow .fn{font-size:10px;color:var(--ink-4);width:16px}.frow .fl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.frow .fm{font-size:11px;color:var(--ink-4)}


  /* changes surface */
  .changes{flex:1;display:flex;min-height:0}
  .flist{width:300px;flex-shrink:0;border-right:1px solid var(--line);overflow:auto;padding:8px}
  .fitem{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .fitem:hover{background:var(--fill)}.fitem.on{background:var(--fill)}
  .fitem .fp{flex:1;min-width:0;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;text-align:left}
  .fitem .pm{font-size:11px;flex-shrink:0}.fitem .pm .p{color:var(--add-fg)}.fitem .pm .m{color:var(--del-fg)}
  .diffview{flex:1;overflow:auto;padding:0}
  .difffile{padding:9px 14px;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink);font-weight:600;position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(4px)}
  .dl{display:flex;padding:1px 0;font-size:12.5px}
  .dl .ln{width:40px;flex-shrink:0;text-align:right;padding-right:12px;color:var(--ink-5)}
  .dl .tx{white-space:pre-wrap;padding-right:12px}
  .dl.add{background:var(--add-bg)}.dl.add .tx{color:var(--add-fg)}
  .dl.del{background:var(--del-bg)}.dl.del .tx{color:var(--del-fg)}
  .dl.ctx .tx{color:var(--ink-3)}
  .changes-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;row-gap:5px;padding:9px 14px;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink-3)}
  .changes-top b{color:var(--ink)}
  .prbtn{margin-left:auto;flex-shrink:0;font-size:12px;font-weight:600;color:#fff;background:var(--ink);border-radius:8px;padding:5px 12px}
  .pinpane .flist{width:190px}
  .pinpane .changes-top{font-size:12px}

  /* artifacts surface */
  .gallery{flex:1;overflow:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;align-content:start}

  /* audit surface */
  .audit{flex:1;overflow:auto;padding:10px 0}
  .arow{display:flex;gap:11px;padding:10px 18px;align-items:flex-start}
  .arow:hover{background:var(--fill)}
  .arow .ai{width:24px;height:24px;border-radius:7px;background:var(--fill);display:grid;place-items:center;font-size:12px;flex-shrink:0}
  .arow .at{flex:1;min-width:0}.arow .at .a1{color:var(--ink)}.arow .at .a2{font-size:11.5px;color:var(--ink-4);margin-top:1px}
  .arow .atime{font-size:11px;color:var(--ink-4);flex-shrink:0}
  .arow.blocked .ai{background:#fbf3e2;color:var(--amber)}

  /* preview surface */
  .preview{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .browser{border:1px solid var(--line-2);border-radius:11px;overflow:hidden;flex:1;min-height:280px;display:flex;flex-direction:column}
  .urlbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--fill);font-size:12px;color:var(--ink-3)}
  .urlbar .dots{display:flex;gap:5px}.urlbar .dots i{width:9px;height:9px;border-radius:50%;background:var(--line-3)}
  .urlbar .u{flex:1;background:#fff;border:1px solid var(--line-2);border-radius:7px;padding:3px 9px;color:var(--ink-2)}
  .pview{flex:1;display:grid;place-items:center;color:var(--ink-4);background:repeating-linear-gradient(45deg,#fcfcfd,#fcfcfd 10px,#f7f7f9 10px,#f7f7f9 20px)}
  .pmock{width:80%;max-width:420px;background:#fff;border:1px solid var(--line-2);border-radius:10px;padding:14px;box-shadow:0 8px 24px -12px rgba(0,0,0,.15)}
  .pmock .pb{height:9px;border-radius:5px;background:var(--line-2);margin:7px 0}.pmock .pb.s{width:60%}.pmock .pb.a{width:40%;background:var(--blue);opacity:.5}
  .envcard{border:1px solid var(--line-2);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}

      <button class="prbtn">Open PR ↗</button></div>
    <div class="changes" style="flex:1">
      <div class="flist scroll" data-sk="flist">${CHANGES.map((c,i)=>`<div class="fitem ${S.file===i?'on':''}" data-file="${i}">
        <span class="fp mono">${esc(c.path)}</span><span class="pm"><span class="p">+${c.add}</span> <span class="m">−${c.del}</span></span></div>`).join('')}</div>

        <div class="difffile mono">${esc(CHANGES[S.file].path)}</div>

function surfaceArtifacts(){

function surfaceAudit(){
  const rows=AUDIT.map(e=>{
    let badge=e.ok?'<span class="badge ok">approved</span>':'',a2=e.a2,act='',blocked=false;
    if(e.blocked){
      if(S.approved){badge='<span class="badge">requested</span>';a2='deploy → staging · irreversible · requested by agent 9:24';}
      else{blocked=true;badge='<span class="badge wait">needs approval</span>';
        act='<div class="aact"><button class="approve">Approve</button><button class="deny">Deny</button></div>';}
    }
    return `<div class="arow ${blocked?'blocked':''}">
      <div class="ai">${e.ic}</div><div class="at"><div class="a1">${esc(e.a1)} ${badge}</div><div class="a2">${esc(a2)}</div></div>
      ${act}<div class="atime">${e.t}</div></div>`;}).join('');
  // the approval/denial is itself a side-effect — it lands as its own event once taken (whoever clicked it, anywhere)
  const ev=S.approved==='yes'?{ic:'✓',a1:'Alex approved deploy → staging',a2:'staging deploy started',t:'9:25',ok:true}
    :S.approved==='no'?{ic:'↓',a1:'Alex denied deploy → staging',a2:'agent continued without it',t:'9:25'}:null;
  const evRow=ev?`<div class="arow"><div class="ai">${ev.ic}</div><div class="at"><div class="a1">${esc(ev.a1)} ${ev.ok?'<span class="badge ok">done</span>':'<span class="badge">skipped</span>'}</div><div class="a2">${esc(ev.a2)}</div></div><div class="atime">${ev.t}</div></div>`:'';
  return `<div class="audit scroll">${rows}${evRow}</div>`;

/* ---- transcript ---- */
function inlineCard(kind){
  if(kind==='changes'){const t=totals();return `<div class="card" data-open="changes"><div class="ch">
    <span class="ci">±</span><span class="ct">Changes · ${t.files} files</span><span class="cm"><span style="color:var(--add-fg)">+${t.add}</span> <span style="color:var(--del-fg)">−${t.del}</span> · feat/driver-set</span><span class="go">View ↗</span></div></div>`;}
  if(kind==='artifacts')return `<div class="gallery-inline">${ARTIFACTS.map(a=>`<div class="acard" data-open="artifacts"><div class="thumb"><span class="ext">${a.name.split(".").pop().toUpperCase()}</span></div><div class="an">${esc(a.name)}</div><div class="am">${esc(a.meta)}</div></div>`).join('')}</div>`;
  if(kind==='side'){
    if(S.approved==='yes')return `<div class="sideline"><span class="si" style="color:var(--green)">✓</span> Deploy to <b>staging</b> approved — <span style="color:var(--ink-4)">deploying…</span></div>`;
    if(S.approved==='no')return `<div class="sideline"><span class="si">↓</span> Deploy to <b>staging</b> denied — agent continued without it.</div>`;
    return `<div class="gate"><span class="gi">⚠</span><span class="gate-t">Approve <b>deploy → staging</b>? <span style="color:var(--ink-4)">irreversible</span></span>
      <span class="aact"><button class="approve">Approve</button><button class="deny">Deny</button></span></div>`;}
  return '';
}
// hover toolbar (quick actions) + reaction pill + right-click/⋯ context menu
function barHTML(surface){const mid=surface==='channel'
    ?`<button class="mb" data-act="reply" title="Reply in thread">${ic('reply')}</button>`
    :`<button class="mb" data-act="comment" title="Comment">${ic('comment')}</button>`;
  return `<div class="msgbar"><button class="mb" data-act="react" title="React">${ic('smile')}</button>${mid}<button class="mb" data-act="more" title="More">${ic('more')}</button></div>`;}
function rxn(rid){return S.rxn[rid]?`<div class="rxn" data-rid="${rid}">${ic('smile')} 1</div>`:'';}
// keep the line lit (row highlight + quick-bar) while its context menu is open
function aCls(rid){return S.menu&&S.menu.rid===rid?' act':'';}
function menuHTML(){const s=S.menu.surface,it=(a,l,c='')=>`<button class="cm-item ${c}" data-act="${a}">${l}</button>`;
  const body=s==='channel'
    ?it('react','React…')+it('reply','Reply in thread')+it('agent','@agent this → new session')+'<div class="cm-sep"></div>'+it('pin','Pin to channel')+it('copy','Copy link')+it('edit','Edit')+it('delete','Delete','cm-danger')
    :it('comment','Comment')+it('steer',S.role==='spectator'?'Suggest about this':'Steer about this')+it('react','React…')+'<div class="cm-sep"></div>'+it('copy','Copy')+it('link','Copy link to turn');
  return `<div class="ctx-scrim" data-cmclose="1"></div><div class="ctxmenu" style="left:${S.menu.x}px;top:${S.menu.y}px">${body}</div>`;}
function noteCtrl(it,id){if(it.notes&&it.notes.length){const res=it.notes.every(n=>n.resolved);
    return `<button class="cdot ${res?'res':''}" data-note="${id}" title="${it.notes.length} comment"><span class="b"></span>${it.notes.length}</button>`;}
  return '';}
function noteBox(it,id){if(!(it.notes&&it.notes.length&&S.open['n'+id]))return '';
  return it.notes.map(n=>`<div class="note ${n.resolved?'res':''}"><span class="nn">${n.by}</span>${esc(n.text)}<span class="rz">${n.resolved?'resolved ✓':'Resolve'}</span></div>`).join('');}
function itemHTML(it,turn,ti){const id=`${turn.n}-${ti}`,o=S.open[id];
  if(it.k==="steer")return `<div class="beat${aCls(id)}" data-ctx="item" data-rid="${id}"><div class="nm">${it.who}<span class="tm">${TIMES[turn.n-1]||''}</span>${it.spawn?'<span class="spawn">started the session · <span class="mention">@agent</span></span>':''}</div><div class="say">${esc(it.text)}</div>${barHTML('item')}${rxn(id)}</div>`;
  if(it.k==="text")return `<div class="resp${aCls(id)}" data-ctx="item" data-rid="${id}">${esc(it.text)}${noteCtrl(it,id)}${barHTML('item')}${noteBox(it,id)}${rxn(id)}</div>`;
  if(it.k==="reason")return `<div class="resp${aCls(id)}" data-ctx="item" data-rid="${id}"><button class="tg" data-tool="${id}">${o?'▾':'▸'} thought for ${it.sec}s</button>${barHTML('item')}${o&&it.text?`<div class="tout mono">${esc(it.text)}</div>`:''}${rxn(id)}</div>`;
  if(it.k==="step"||it.k==="tool"){
    // edit step: concrete file + coloured +/- counts; click opens that file in Changes
    if(it.add!==undefined)return `<div class="resp${aCls(id)}" data-ctx="item" data-rid="${id}"><button class="tg" data-openfile="${esc(it.label)}" title="Open in Changes">· edited <span class="ef mono">${esc(it.label)}</span> <span class="cadd">+${it.add}</span> <span class="cdel">−${it.del}</span>${it.note?` <span class="dim">${esc(it.note)}</span>`:''}</button>${noteCtrl(it,id)}${barHTML('item')}${noteBox(it,id)}${rxn(id)}</div>`;
    const lab=esc(it.label||('ran '+(it.cmd||'')+(it.out?' · '+it.out:'')));
    // step that produced an artifact → inline chip that opens the gallery
    const made=it.art?`<div class="madeline"><span class="artchip" data-open="artifacts"><span class="ax">${it.art.ext||it.art.name.split('.').pop().toUpperCase()}</span><span class="an2">${esc(it.art.name)}</span>${it.art.meta?`<span class="am2">${esc(it.art.meta)}</span>`:''}</span></div>`:'';
    if(!it.out)return `<div class="resp${aCls(id)}" data-ctx="item" data-rid="${id}"><span class="tg static">· ${lab}</span>${noteCtrl(it,id)}${barHTML('item')}${made}${noteBox(it,id)}${rxn(id)}</div>`;
    return `<div class="resp${aCls(id)}" data-ctx="item" data-rid="${id}"><button class="tg${it.err?' err':''}" data-tool="${id}">${o?'▾':'▸'} ${lab}</button>${noteCtrl(it,id)}${barHTML('item')}${o?`<div class="tout mono">${esc(it.out)}</div>`:''}${made}${noteBox(it,id)}${rxn(id)}</div>`;}
  if(it.k==="live"){
    if(S.stopped)return `<div class="live-line stopped"><span class="ld off"></span>stopped by you · the agent halted mid-run</div>`;
    const txt=S.approved==='yes'?'deploying → staging…':S.approved==='no'?'deploy denied — continuing without it':esc(it.text);
    return `<div class="live-line"><span class="ld"></span>${txt}</div>`;}
  // committed design: reference work products (changes/artifacts) live in the summary strip;
  // only the gated side-effect — a decision you act on — stays inline in the transcript.
  if(it.k==="side")return inlineCard('side');
  return "";
}
function transcriptHTML(){return `<div class="read scroll" data-sk="read"><div class="col">${SESSION.turns.map(t=>`<div class="tblk" id="t-${t.n}">${t.items.map((it,ti)=>itemHTML(it,t,ti)).join('')}</div>`).join('')}</div></div>`;}

function tocHTML(){const turns=SESSION.turns;
  const lines=turns.map(t=>`<span class="tl ${t.n===2?'on':''} ${t.items.some(i=>i.k==='live')?'run':''}"></span>`).join('');
  const rows=turns.map(t=>`<div class="frow" data-seg="${t.n}"><span class="fn">T${t.n}</span><span class="fl">${esc(t.lead)}</span></div>`).join('');
  return `<div class="toc"><div class="toc-lines">${lines}</div>
    <div class="toc-menu"><div class="toc-card"><div class="tt">Turns</div>${rows}
      <div class="tt" style="margin-top:4px">Jump to</div>

      <div class="frow" data-open="artifacts"><span class="fn">▦</span><span class="fl">Artifacts</span><span class="fm">${ARTIFACTS.length}</span></div>
      <div class="frow" data-open="audit"><span class="fn">⤴</span><span class="fl">Side-effects</span><span class="fm">3</span></div>
    </div></div></div>`;
}

// agmodel switches model + thinking; the ⓘ button pops read-only container/env (each its own popover)
function setupPop(){
  if(S.setup==='env'){
    const snap=S.env==='warm'?`warm · port 3000 exposed · $${SESSION.cost.toFixed(2)} so far`
      :S.env==='sleeping'?'sleeping · resume rebuilds (~30s)':'expired · snapshot GC’d';
    return `<div class="ctx-scrim" data-setupclose="1"></div><div class="setup-pop">
      <div class="sp-sec">Container</div><div class="sp-meta">ubuntu-24 · node 20 · pnpm</div>
      <div class="sp-sec">Environment</div><div class="sp-meta">3 secrets · ${snap}</div>

  const models=['Opus 4.8','Sonnet 4.6','Haiku 4.5'],think=['off','low','medium','high'],cap=s=>s[0].toUpperCase()+s.slice(1);
  const row=(on,label,attr)=>`<button class="sp-row" ${attr}>${label}${on?'<span class="ck">✓</span>':''}</button>`;

function agbarHTML(){

  const run=S.stopped

    : `<button class="agrun" data-stop="1" title="Working — click to stop the agent"><span class="ld"></span><span class="lbl-run">Working</span><span class="lbl-stop">Stop</span></button>`;

}
function composerHTML(){
  if(S.env==='expired')return `<div class="comp"><div class="comp-in"><div class="field off"><span class="to">↳ agent</span><input disabled placeholder="environment expired — rebuild to continue"/></div></div></div>`;
  const ph=S.env==='sleeping'?'Message — sending wakes the environment':'Message the agent…';
  if(S.role==='spectator')return `<div class="comp"><div class="comp-in">
    <div class="typing">Sam is composing a suggestion…</div>

    <div class="by">Mara has the seat · <button class="seatbtn">Request seat</button></div></div></div>`;
  // driver: spectator suggestions queue (steering proposals) above the agent composer

  const sentNote=S.sent?`<div class="typing">Sent ${S.sent.by}’s suggestion to the agent ✓</div>`:'';
  // seat hand-off appears only when actionable (someone wants your seat)
  const seat=S.seatReq?`<div class="seatreq"><b>${S.seatReq}</b> wants the seat <span class="d2">· you're driving</span><button class="g" data-seatgrant="1">Grant</button><button class="xd" data-seatdeny="1" title="Dismiss">✕</button></div>`:'';
  return `<div class="comp"><div class="comp-in">
    ${queue}${sentNote}${seat}${agbarHTML()}
    <div class="field steer"><span class="to">↳ agent</span><input placeholder="${S.sent?'“'+esc(S.sent.q)+'”':ph}"/><button class="gobtn">↑</button></div></div></div>`;
}

  const e=S.env;const lbl=e==='warm'?'warm':e==='sleeping'?'sleeping':'expired';

  const crumb=`<button class="crumb" data-back="1" title="Back to the channel">← #eng-platform</button>`;

  return `<div class="sess-h">${crumb}<span class="ti">${esc(SESSION.title)}</span>

function sessionLayout(){
  const t=totals();
  const stat=(open,ic,html)=>`<div class="stat" data-open="${open}"><span class="ic">${ic}</span>${html}</div>`;
  const strip=`<div class="strip">
    ${stat('changes','±',`<b>${t.files}</b> files <span style="color:var(--add-fg)">+${t.add}</span> <span style="color:var(--del-fg)">−${t.del}</span>`)}
    ${stat('artifacts','▦',`<b>${t.arts}</b> artifacts`)}
    ${stat('audit','⤴',`<b>1</b> PR · ${S.approved==='yes'?'<b>1</b> deployed':S.approved==='no'?'<b>1</b> skipped':'<b>1</b> gated'}`)}
    ${stat('preview',S.env==='warm'?'●':'○',`preview ${S.env==='warm'?'live':S.env}`)}
  </div>`;
  return `<div class="session">${headerHTML()}${roBanner()}${strip}${S.detached?detachedBanner():''}
    <div class="body">${workArea()}</div>${composerHTML()}</div>`;
}
function drawerHTML(){
  const acts=S.device==='mobile'?'':`<span class="dh-acts"><button class="pin" title="Pin beside transcript">⤢ Pin</button><button class="detach" title="Detach to ${detachTarget()}">↗</button></span>`;
  return `<div class="scrim ${S.drawer?'open':''}" data-close="1"></div>
    <div class="drawer ${S.drawer?'open':''}"><div class="drawer-h">${S.drawer?SURF_TITLES[S.drawer]:''}${S.drawer?acts:''}<span class="x" data-close="1">✕</span></div>
      <div class="drawer-b">${S.drawer?surface(S.drawer):''}</div></div>`;
}

function artchipHTML(a){return `<span class="artchip" data-open="artifacts"><span class="ax">${a.ext||a.name.split('.').pop().toUpperCase()}</span><span class="an2">${esc(a.name)}</span>${a.meta?`<span class="am2">${esc(a.meta)}</span>`:''}</span>`;}
function cardAvatars(){const driver="Mara";const ppl=[...PEOPLE].sort((a,b)=>(a.n===driver?-1:b.n===driver?1:0));
  const show=ppl.slice(0,4),extra=ppl.length-show.length,init=n=>n==="You"?"Y":n[0];
  return `<span class="who">`+show.map(p=>`<span class="av ${p.n===driver?'seat':''}">${init(p.n)}</span>`).join('')+(extra>0?`<span class="av more">+${extra}</span>`:'')+`</span>`;}
function chMsg(m){return `<div class="cmsg${aCls(m.id)}" data-ctx="channel" data-rid="${m.id}"><div class="cn">${m.who}<span class="tm">${m.t}</span></div><div class="cb">${m.body}</div>${barHTML('channel')}${m.react?`<span class="crx">${ic('smile')} ${m.react}</span>`:''}${rxn(m.id)}</div>`;}
// the approval gate (drives the deploy state) — actionable in the card, or in the thread when expanded
function chGate(){return S.approved==='yes'?`<div class="chgate done">✓ approved by Alex — deploying → staging…</div>`
  :S.approved==='no'?`<div class="chgate done">denied — agent continued without it</div>`
  :`<div class="chgate"><span class="gate-t">approve <b>deploy → staging</b>? <span class="mention">@Alex</span></span><span class="aact"><button class="approve">Approve</button><button class="deny">Deny</button></span></div>`;}
// a milestone renders consistently: artifact → chip, PR → pill, approval → gate
function agentExtra(a){
  if(a.art)return `<div class="madeline">${artchipHTML(a.art)}</div>`;
  if(a.kind==='pr')return `<div class="madeline"><span class="prpill">PR #128 · ${a.meta||''}</span></div>`;
  if(a.kind==='approval')return chGate();
  return '';}
function statusBadge(){return S.approved==='yes'?`<span class="badge ok">deploying</span>`:S.approved==='no'?'':`<span class="badge wait">needs you</span>`;}
function sessionCard(wide){
  const t=totals(),last=APOSTS[APOSTS.length-1],open=S.threadOpen;
  // the agent's current ask shows once: in the card when collapsed, in the thread when expanded
  const latest=open?'':(last.kind==='approval'
    ? chGate()
    : `<div class="scard-latest">↳ <span class="dim">latest</span> ${esc(last.body)}<span class="tt"> · ${last.t}</span></div>`);
  const arts=open?'':`<div class="scard-arts">${ARTIFACTS.map(artchipHTML).join('')}</div>`;
  const thread=`<div class="scard-thread">
      ${open?APOSTS.map(a=>`<div class="threply"><div class="trow"><span class="tb">${esc(a.body)}</span><span class="tt">${a.t}</span></div>${agentExtra(a)}</div>`).join(''):''}
      <button class="scard-up" data-thread="1">${open?'▾':'▸'} ${APOSTS.length} updates from the agent</button></div>`;
  return `<div class="ch-scard rich ${wide?'':'open'}">
    <div class="t"><span class="live"></span><span class="scard-ti" data-open-session="1">migrate sessions → driver set</span>${statusBadge()}</div>
    <div class="scard-row">${cardAvatars()}<span class="dim">Mara driving · 4 watching</span></div>
    <div class="scard-meta"><b>±${t.files} files</b> +${t.add} −${t.del} · PR #128 · $${SESSION.cost.toFixed(2)}</div>
    ${latest}${arts}${thread}
    <div class="scard-foot"><button class="scard-open" data-open-session="1">Open session →</button></div></div>`;}
function channelHTML(wide){
  // 'approved — go for it' is a consequence of approving: it only appears once the deploy is approved
  const spawn=CHAN.findIndex(m=>m.spawn),head=CHAN.slice(0,spawn+1),
    tail=CHAN.slice(spawn+1).filter(m=>!m.afterApprove||S.approved==='yes').map(chMsg).join('');
  return `<div class="channel ${wide?'wide':''}">
  <div class="ch-h"># eng-platform <span class="cnt">· 24</span></div>
  <div class="ch-b scroll" data-sk="chan">
    <div class="ch-intro"><div class="ii">#</div><div class="it">eng-platform</div>
      <div class="is">Infrastructure, CI/CD, and the shared services the rest of engineering builds on.</div></div>
    <div class="ch-div">Today</div>
    ${head.map(chMsg).join('')}
    ${sessionCard(wide)}
    ${tail}
  </div>
  <div class="ch-c"><div class="field"><span class="plus">+</span><input placeholder="Message #eng-platform — @agent to start a session"/><button class="gobtn">↑</button></div></div>
</div>`;}
function sessionsRail(){
  const row=(badge,bcls,title,sub)=>`<div class="srow ${bcls==='attn'?'attn':''}" data-open-session="1">
    <div class="sr-d ${bcls}"></div><div class="sr-t"><div class="sr-1">${title}</div><div class="sr-2">${sub}</div></div>
    ${badge?`<div class="sr-b ${bcls}">${badge}</div>`:''}</div>`;
  const ch=c=>`<span class="sr-ch">#${c}</span>`;
  return `<div class="srail">
    <div class="sr-h">Sessions <span class="cnt">· across your channels</span></div>
    <div class="sr-list scroll">
      ${S.approved==='yes'?row('deploying','run','migrate sessions → driver set',ch('eng-platform')+' · now')
        :S.approved==='no'?row('','run','migrate sessions → driver set',ch('eng-platform')+' · now')
        :row('needs you','attn','migrate sessions → driver set',ch('eng-platform')+' · now')}
      ${row('','run','flaky test triage',ch('mobile')+' · 6m')}
      <div class="sr-sec">Recent</div>
      ${row('','done','bump deps to vite 8',ch('eng-platform')+' · 14m')}
      ${row('','done','tighten rate-limit window',ch('api')+' · 1h')}
    </div>
    <div class="sr-f">＋ New session — <b>@agent</b> in any channel</div>
  </div>`;
}
function frameHTML(){
  const cm=S.menu?menuHTML():'';
  // mobile is single-column: the channel when browsing, the session once you've opened one (← goes back)
  if(S.device==='mobile')return `<div class="frame mobile">${S.view==='browse'?channelHTML(true):sessionLayout()}${cm}</div>`;
  const nav='<div class="nav"><div class="logo">A</div><div class="nv on">#</div><div class="nv">◎</div><div class="nv">✦</div></div>';
  if(S.view==='browse')return `<div class="frame ${S.device}">${nav}${channelHTML(true)}${sessionsRail()}${cm}</div>`;
  const chan=S.view==='peek'?channelHTML(false):'';
  return `<div class="frame ${S.device}">${nav}${chan}${sessionLayout()}${cm}</div>`;
}

function syncSeg(){['device','view','role'].forEach(k=>document.querySelectorAll(`#seg-${k} button`).forEach(b=>b.classList.toggle('on',b.dataset.v===S[k])));}
function render(){
  // preserve scroll across re-renders — innerHTML replace would otherwise jump every pane to the top
  const sc={};document.querySelectorAll('[data-sk]').forEach(e=>sc[e.dataset.sk]=e.scrollTop);
  document.getElementById('stage').innerHTML=frameHTML();
  document.querySelectorAll('[data-sk]').forEach(e=>{if(sc[e.dataset.sk]!=null)e.scrollTop=sc[e.dataset.sk];});
  wire();hint();syncSeg();
  try{location.hash=`device=${S.device},view=${S.view},env=${S.env}${S.pinned?',pinned='+S.pinned:''}${S.detached?',detached='+S.detached:''}`;}catch(e){}}
function hint(){const h=document.getElementById('hint');
  h.textContent=S.pinned?'Pinned beside the transcript — ↗ detaches, ✕ unpins, click a stat to swap.'
    :S.detached?`Detached to ${detachTarget()} — Re-dock to bring it back.`
    :S.device==='mobile'?'Mobile: tap a stat → full-screen surface (no pin/detach).'
    :S.view==='browse'?'Channel — sessions are cards in the timeline + the Sessions rail. Click one to open.'
    :S.view==='peek'?'Split: chat ⇄ agent. Click a stat → peek → ⤢ Pin or ↗ Detach.'
    :'Focus: just the agent. Click a stat → peek → ⤢ Pin (split) or ↗ Detach.';}

function wire(){
  ['device','view','role'].forEach(k=>document.querySelectorAll(`#seg-${k} button`).forEach(b=>b.onclick=()=>{
    S[k]=b.dataset.v;
    if(k==='device'||k==='view'){S.drawer=null;S.pinned=null;S.detached=null;}
    render();}));
  document.querySelectorAll('[data-thread]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.threadOpen=!S.threadOpen;render();});
  document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{S.open[b.dataset.tool]=!S.open[b.dataset.tool];render();});
  document.querySelectorAll('[data-file]').forEach(b=>b.onclick=()=>{S.file=+b.dataset.file;render();});
  // an edited file in the transcript opens that file in Changes (drawer, or the pinned slot)
  document.querySelectorAll('[data-openfile]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const i=CHANGES.findIndex(c=>c.path===b.dataset.openfile);if(i>=0)S.file=i;if(S.pinned)S.pinned='changes';else S.drawer='changes';render();});
  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const s=b.dataset.open;
    if(S.pinned){S.pinned=s;}            /* single swappable pinned slot */
    else{S.drawer=s;}render();});
  document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{S.drawer=null;render();});
  document.querySelectorAll('.approve').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.approved='yes';render();});
  document.querySelectorAll('.deny').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.approved='no';render();});
  // pin / detach grammar
  // pinning needs room: collapse the channel into focus (restore it on unpin) — never a cramped 3-column
  document.querySelectorAll('.pin').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.pinned=S.drawer;S.drawer=null;
    if(S.view==='peek'){S.viewBeforePin='peek';S.view='focus';}render();});
  document.querySelectorAll('[data-open-session]').forEach(b=>b.onclick=()=>{S.view='peek';render();});
  document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>{S.view='browse';S.pinned=null;S.drawer=null;S.detached=null;render();});
  // contents handle: tap to open on touch (CSS :hover covers desktop); jump scrolls + closes — no render, so scroll sticks
  document.querySelectorAll('.toc-lines').forEach(b=>b.onclick=(e)=>{e.stopPropagation();b.closest('.toc').classList.toggle('open');});
  document.querySelectorAll('[data-seg]').forEach(b=>b.onclick=()=>{const el=document.getElementById('t-'+b.dataset.seg);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});b.closest('.toc')?.classList.remove('open');});
  if(!window.__tocOutside){window.__tocOutside=true;document.addEventListener('click',(e)=>{document.querySelectorAll('.toc.open').forEach(t=>{if(!t.contains(e.target))t.classList.remove('open');});});}
  document.querySelectorAll('[data-note]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const id=b.dataset.note;S.open['n'+id]=!S.open['n'+id];render();});
  document.querySelectorAll('[data-stop]').forEach(b=>b.onclick=()=>{S.stopped=true;render();});
  // suggestion queue: Send promotes a teammate's steer to the agent; ✕ dismisses it
  document.querySelectorAll('[data-sgsend]').forEach(b=>b.onclick=()=>{S.sent=S.sugg.splice(+b.dataset.sgsend,1)[0];render();});
  document.querySelectorAll('[data-sgdrop]').forEach(b=>b.onclick=()=>{S.sugg.splice(+b.dataset.sgdrop,1);render();});
  // model/thinking popover (container & env are read-only inside it) + seat hand-off
  document.querySelectorAll('[data-setup]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const v=b.dataset.setup;S.setup=(v==='toggle')?(S.setup==='main'?false:'main'):(S.setup===v?false:v);render();});
  document.querySelectorAll('[data-setupclose]').forEach(b=>b.onclick=()=>{S.setup=false;render();});
  document.querySelectorAll('[data-model]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.model=b.dataset.model;render();});
  document.querySelectorAll('[data-think]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.think=b.dataset.think;render();});
  document.querySelectorAll('[data-seatgrant]').forEach(b=>b.onclick=()=>{S.seatReq=null;render();});
  document.querySelectorAll('[data-seatdeny]').forEach(b=>b.onclick=()=>{S.seatReq=null;render();});
  // expand/collapse channel pane (the ← breadcrumb handles "back to channel" via data-back)
  document.querySelectorAll('[data-pane]').forEach(b=>b.onclick=()=>{S.view=b.dataset.pane;S.drawer=null;render();});
  // hover toolbar quick actions
  document.querySelectorAll('.mb').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const it=b.closest('[data-ctx]');if(!it)return;const surface=it.dataset.ctx,rid=it.dataset.rid,act=b.dataset.act;
    if(act==='react'){if(S.rxn[rid])delete S.rxn[rid];else S.rxn[rid]=true;render();}
    else if(act==='comment'){S.open['n'+rid]=!S.open['n'+rid];render();}
    else if(act==='more'){const r=b.getBoundingClientRect();S.menu={surface,rid,x:Math.min(r.left,window.innerWidth-224),y:r.bottom+4};render();}
    else render();});
  // right-click → context menu at cursor
  document.querySelectorAll('[data-ctx]').forEach(el=>el.addEventListener('contextmenu',(e)=>{e.preventDefault();e.stopPropagation();
    S.menu={surface:el.dataset.ctx,rid:el.dataset.rid,x:Math.min(e.clientX,window.innerWidth-224),y:Math.min(e.clientY,window.innerHeight-270)};render();}));
  // context-menu item actions
  document.querySelectorAll('.cm-item').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const act=b.dataset.act,m=S.menu;
    if(m&&act==='react')S.rxn[m.rid]=true;
    else if(m&&act==='comment')S.open['n'+m.rid]=true;
    S.menu=null;render();});
  document.querySelectorAll('[data-cmclose]').forEach(b=>b.onclick=()=>{S.menu=null;render();});
  document.querySelectorAll('.rxn').forEach(p=>p.onclick=()=>{delete S.rxn[p.dataset.rid];render();});
  document.querySelectorAll('.detach').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.detached=S.drawer||S.pinned;S.drawer=null;S.pinned=null;
    if(S.viewBeforePin){S.view=S.viewBeforePin;S.viewBeforePin=null;}render();});
  document.querySelectorAll('.unpin').forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.pinned=null;
    if(S.viewBeforePin){S.view=S.viewBeforePin;S.viewBeforePin=null;}render();});
  document.querySelectorAll('.redock').forEach(b=>b.onclick=()=>{S.pinned=S.detached;S.detached=null;render();});
}
(function(){const h=location.hash.replace(/^#/,'');if(h)h.split(',').forEach(kv=>{const[k,v]=kv.split('=');if(k in S)S[k]=v;});})();
render();
</script>
</body>
</html>
