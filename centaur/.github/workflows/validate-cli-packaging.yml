name: Validate CLI Packaging

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/validate-cli-packaging.yml
      - scripts/validate_cli_packaging.py
      - tools/**
  merge_group:
  push:
    branches: [main]
    paths:
      - .github/workflows/validate-cli-packaging.yml
      - scripts/validate_cli_packaging.py
      - tools/**

concurrency:
  group: validate-cli-packaging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-cli-packaging:
    name: Validate CLI pyproject packaging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate CLI pyproject packaging
        run: python scripts/validate_cli_packaging.py
