[project]
name = "googlenews"
description = "Google News RSS CLI for news search and headlines"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "feedparser>=6.0.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
googlenews = "centaur_tool_googlenews.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_googlenews"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
hosts = ["news.google.com"]
secrets = []
