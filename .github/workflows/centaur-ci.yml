name: Centaur CI

# Ported from the vendored centaur/.github/workflows/ci.yml (which is inert here — GitHub
# only runs root workflows). Scoped to centaur/** changes. Publishing workflows are NOT
# ported (they'd push to Centaur's registries from the wrong repo). The heavy kind e2e is
# included on master pushes but kept out of the required PR gate (see
# centaur-ci-success allowed-skips).
# See docs/centaur-vendoring.md.

# Always runs (no top-level path filter) so the `Centaur CI success` check reports on
# EVERY PR — required-check-safe. The heavy jobs gate on `ci_changes`, so a non-centaur PR
# just runs the ~8s detector + the aggregator (heavy jobs skip) and reports green-fast.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: centaur-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci_changes:
    name: Detect Centaur CI changes
    runs-on: ubuntu-latest
    outputs:
      migration_order: ${{ steps.filter.outputs.migration_order }}
      github_bootstrap_demotion: ${{ steps.filter.outputs.github_bootstrap_demotion }}
      rust_api: ${{ steps.filter.outputs.rust_api }}
      node_sync: ${{ steps.filter.outputs.node_sync }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: filter
        name: Detect changed paths
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${base}...HEAD")"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}...HEAD")"
          fi

          matches() {
            local pattern
            for pattern in "$@"; do
              if printf '%s\n' "${changed_files}" | grep -Eq "${pattern}"; then
                return 0
              fi
            done
            return 1
          }

          set_output() {
            local name="$1"; shift
            if matches "$@"; then
              echo "${name}=true" >>"${GITHUB_OUTPUT}"
            else
              echo "${name}=false" >>"${GITHUB_OUTPUT}"
            fi
          }

          set_output migration_order \
            '^centaur/services/api-rs/crates/centaur-session-sqlx/migrations/' \
            '^centaur/services/console/db/migrate/' \
            '^centaur/\.github/scripts/check-migration-order\.sh$' \
            '^\.github/workflows/centaur-ci\.yml$'
          set_output github_bootstrap_demotion \
            '^centaur/contrib/scripts/bootstrap-k8s-secrets\.sh$' \
            '^centaur/\.github/scripts/check-github-bootstrap-demotion\.sh$' \
            '^\.github/workflows/centaur-ci\.yml$'
          set_output rust_api \
            '^centaur/services/api-rs/' \
            '^\.github/workflows/centaur-ci\.yml$'
          set_output node_sync \
            '^centaur/services/api-rs/crates/centaur-node-sync/' \
            '^centaur/contrib/chart/' \
            '^\.github/workflows/centaur-ci\.yml$'

  migration-order:
    name: Migration order
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.migration_order == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check migration versions
        working-directory: centaur
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="HEAD~1"
            fi
          else
            base="origin/${{ github.base_ref || 'master' }}"
          fi
          .github/scripts/check-migration-order.sh "$base"

  github-bootstrap-demotion:
    name: GitHub bootstrap demotion
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.github_bootstrap_demotion == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check bootstrap script does not seed GITHUB_TOKEN
        working-directory: centaur
        run: .github/scripts/check-github-bootstrap-demotion.sh

  rust-api:
    name: Rust API fmt, clippy, and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.rust_api == 'true'
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: centaur/services/api-rs

      - name: Format
        working-directory: centaur/services/api-rs
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: centaur/services/api-rs
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: centaur/services/api-rs
        env:
          SESSION_SQLX_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: cargo test --workspace

      - name: Start API integration test dependencies
        run: |
          docker run --detach --name centaur-api-integration-test-postgres \
            --publish 127.0.0.1:15432:5432 \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            --env POSTGRES_DB=centaur \
            paradedb/paradedb:0.23.0-pg16 \
            -c shared_preload_libraries=pg_search,pg_cron \
            -c max_connections=500
          for _ in {1..60}; do
            if docker logs centaur-api-integration-test-postgres 2>&1 \
              | grep -q 'PostgreSQL init process complete' \
              && docker exec centaur-api-integration-test-postgres \
              psql -U postgres -d centaur -tAc 'select 1' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs centaur-api-integration-test-postgres
          exit 1

      - name: Run API integration test
        working-directory: centaur/services/api-rs
        env:
          API_INTEGRATION_WORKFLOW_DIR: ${{ runner.temp }}/api-integration-workflows
          BIND_ADDR: 127.0.0.1:18080
          CENTAUR_API_URL: http://127.0.0.1:18080
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/centaur?sslmode=disable
          RUN_MIGRATIONS: "true"
          RUST_LOG: info
          WORKFLOW_DIRS: ${{ runner.temp }}/api-integration-workflows
          WORKFLOW_HOST_SANDBOX: "false"
          WORKFLOW_REAP_REMOVED_AFTER_TICKS: "1"
          WORKFLOW_RECONCILE_INTERVAL_SECS: "1"
        run: |
          mkdir -p "$API_INTEGRATION_WORKFLOW_DIR"
          cargo build --locked -p centaur-api-server -p centaur-api-integration-test

          ./target/debug/centaur-api-server > "$RUNNER_TEMP/centaur-api-server.log" 2>&1 &
          api_pid="$!"
          echo "$api_pid" > "$RUNNER_TEMP/centaur-api-server.pid"
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT

          ./target/debug/centaur-api-integration-test

      - name: Dump API integration test logs
        if: ${{ failure() }}
        run: |
          cat "$RUNNER_TEMP/centaur-api-server.log" || true
          docker logs centaur-api-integration-test-postgres || true

      - name: Cleanup API integration test dependencies
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/centaur-api-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/centaur-api-server.pid")" 2>/dev/null || true
          fi
          docker rm -f centaur-api-integration-test-postgres || true

  node-sync-overlay:
    name: node-sync overlay scanner validation
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.node_sync == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: centaur/services/api-rs

      # Real overlay + scan-demo: locks in the syscall proofs (whiteout→Delete,
      # symlink→metadata-only, openat2 NO_SYMLINKS blocks the /etc/shadow escape).
      - name: Overlay scanner validation
        working-directory: centaur/services/api-rs
        run: bash crates/centaur-node-sync/ci/overlay-validation.sh

  node-sync-pod-e2e:
    name: node-sync pod-native overlay e2e
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.node_sync == 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install kind, kubectl, and helm
        env:
          KIND_VERSION: v0.23.0
          KUBECTL_VERSION: v1.30.4
          HELM_VERSION: v3.15.4
        run: |
          set -euo pipefail

          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSLo kubectl.sha256 "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum -c -
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          HELM_ARCHIVE="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLo "${HELM_ARCHIVE}" "https://get.helm.sh/${HELM_ARCHIVE}"
          curl -fsSLo "${HELM_ARCHIVE}.sha256sum" "https://get.helm.sh/${HELM_ARCHIVE}.sha256sum"
          sha256sum -c "${HELM_ARCHIVE}.sha256sum"
          tar -xzf "${HELM_ARCHIVE}"
          sudo mv linux-amd64/helm /usr/local/bin/helm

          kind version
          kubectl version --client
          helm version

      - name: Create kind cluster
        run: kind create cluster --name centaur

      - name: Build, load, and run pod-native e2e
        working-directory: centaur/services/api-rs
        env:
          KIND_CLUSTER: centaur
          NS: centaur
        run: |
          bash crates/centaur-node-sync/ci/build-and-load.sh
          NODE_SYNC_SKIP_BUILD_LOAD=1 bash crates/centaur-node-sync/ci/pod-native-e2e.sh

      # Warm-cache real-pod e2e (warm-lease 2.2d-v): the shipped image's
      # warmcache-hydrate init container warms the depcache for an agent pod.
      # Informational — needs no overlay, reuses the cluster + loaded image.
      - name: Warm-cache pod e2e (informational)
        continue-on-error: true
        working-directory: centaur/services/api-rs
        env:
          KIND_CLUSTER: centaur
          NS: centaur
          IMAGE: centaur-node-sync:e2e
        run: bash crates/centaur-node-sync/ci/warmcache-pod-e2e.sh

      # SPIKE (warm-pool for repo sessions): proves the post-claim in-place overlay remount
      # propagates into an already-running pod (HostToContainer post-start). Informational.
      - name: Warm-pool repo-rebind spike POC (informational)
        continue-on-error: true
        working-directory: centaur/services/api-rs
        env:
          KIND_CLUSTER: centaur
          NS: centaur
          IMAGE: centaur-node-sync:e2e
        run: bash crates/centaur-node-sync/ci/warmpool-rebind-poc.sh

      # SPIKE: flat-home HOME composition — generic harness-config lower + repo lower compose into a
      # flat HOME on a running pod, with centaur's AGENTS.md precedence. Informational. (Real-harness
      # sub-step auto-runs only with the centaur-agent image; here the node-sync image just provides sh.)
      - name: Warm-pool HOME-composition spike POC (informational)
        continue-on-error: true
        working-directory: centaur/services/api-rs
        env:
          KIND_CLUSTER: centaur
          NS: centaur
          IMAGE: centaur-node-sync:e2e
        run: bash crates/centaur-node-sync/ci/warmpool-home-compose-poc.sh

      - name: Dump pod diagnostics
        if: ${{ failure() }}
        run: |
          kubectl -n centaur get pods -o wide || true
          kubectl -n centaur describe pods || true
          kubectl -n centaur logs -l app.kubernetes.io/component=node-sync --all-containers --tail=200 || true
          kubectl -n centaur logs deploy/capture-sink --tail=100 || true

      - name: Delete kind cluster
        if: ${{ always() }}
        run: kind delete cluster --name centaur

  centaur-ci-success:
    name: Centaur CI success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - ci_changes
      - migration-order
      - github-bootstrap-demotion
      - rust-api
      - node-sync-overlay
    timeout-minutes: 30
    steps:
      # node-sync-pod-e2e (kind cluster) is intentionally NOT in `needs` — it still runs
      # and reports its own status, but its flakier cluster/image-build path must not block
      # merges. The required gate is the deterministic jobs above.
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: migration-order, github-bootstrap-demotion, rust-api, node-sync-overlay
          jobs: ${{ toJSON(needs) }}
