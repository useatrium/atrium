[project]
name = "figma"
description = "Figma design system extraction and analysis"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
figma = "centaur_tool_figma.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_figma"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [
    {type = "http", name = "FIGMA_ACCESS_TOKEN", mode = "inject", inject_header = "X-Figma-Token", hosts = ["api.figma.com"]},
]
