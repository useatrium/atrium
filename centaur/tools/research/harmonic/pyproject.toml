[project]
name = "harmonic"
description = "Harmonic.AI API CLI for startup discovery and company/people enrichment"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
harmonic = "centaur_tool_harmonic.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_harmonic"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "HARMONIC_API_KEY", mode = "inject", inject_header = "apikey", hosts = ["api.harmonic.ai"]}]
