{{- $console := include "centaur.consoleValues" . | fromYaml }}
{{- if $console.enabled }}
{{- $secretEnv := include "centaur.secretEnvName" . }}
{{- $prefix := .Values.secretManager.envPrefix }}
{{- $dbName := $console.database.name }}
{{- $apiRsName := include "centaur.componentName" (dict "root" . "component" "api-rs") }}
# console — Rails control plane for authenticated API access and encrypted
# secret storage. The chart owns the Deployment shape (image, port, env,
# security context) so operators tune it via `helm upgrade`. It runs against a
# dedicated `iron_control_production` database on the bundled Postgres (a separate logical
# DB so its Rails schema_migrations table never collides with the API's migration
# table); the create-db init container provisions that DB idempotently. All
# secret material — the primary DB URL, the bootstrap user/API-key, the three
# ActiveRecord encryption keys, and SECRET_KEY_BASE — comes from the shared
# infra Secret via explicit secretKeyRefs (NOT envFrom, which would leak the
# API's ai_v2 DATABASE_URL into console's env).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.consoleName" . }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "console") | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 4 }}
  ports:
    - name: http
      port: {{ $console.service.httpPort }}
      targetPort: {{ $console.service.httpPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.consoleName" . }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "console") | nindent 4 }}
spec:
  replicas: {{ $console.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Create the console logical databases on the bundled Postgres: the
        # primary plus the Solid Cache/Queue/Cable databases (see
        # config/database.yml). The image entrypoint's `db:prepare` loads schema
        # and migrates each one but does not create them, so they are provisioned
        # here as the admin (ai_v2) DSN whose `tempo` superuser can create
        # databases. Idempotent: each CREATE is guarded by a pg_database check and
        # tolerates a lost race against a concurrent replica.
        - name: create-db
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              # Wait until Postgres accepts connections. A still-starting Postgres
              # — or a Service with no ready endpoint yet — surfaces as connection
              # refused; retry rather than failing (and crash-looping) the init.
              until psql "$ADMIN_DATABASE_URL" -tAc 'SELECT 1' >/dev/null 2>&1; do
                echo "waiting for postgres to accept connections..."
                sleep 2
              done
              # Create each database idempotently.
              for db in $DB_NAMES; do
                exists=$(psql "$ADMIN_DATABASE_URL" -tAc \
                  "SELECT 1 FROM pg_database WHERE datname = '$db'")
                if [ "$exists" != "1" ]; then
                  echo "creating database $db"
                  psql "$ADMIN_DATABASE_URL" -c "CREATE DATABASE \"$db\"" || true
                fi
              done
          env:
            - name: ADMIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sDATABASE_URL" $prefix }}
            # Primary + Solid Cache/Queue/Cable, matching config/database.yml.
            - name: DB_NAMES
              value: {{ printf "%s %s_cache %s_queue %s_cable" $dbName $dbName $dbName $dbName | quote }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: console
          image: {{ printf "%s:%s" $console.image.repository $console.image.tag | quote }}
          imagePullPolicy: {{ $console.image.pullPolicy }}
          env:
            # Explicit secretKeyRefs only — never envFrom the shared Secret, or
            # its DATABASE_URL (ai_v2) would leak into console's env. Env
            # var names match the IRON_CONTROL_* secret keys 1:1 (except
            # SECRET_KEY_BASE, which Rails reads by its standard name). The DB
            # URL carries connection info only (no database path) so each Rails
            # connection's db name comes from the image's database.yml.
            - name: IRON_CONTROL_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_DATABASE_URL" $prefix }}
            - name: IRON_CONTROL_INITIAL_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_INITIAL_USER_EMAIL" $prefix }}
            - name: IRON_CONTROL_INITIAL_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_INITIAL_USER_PASSWORD" $prefix }}
            - name: IRON_CONTROL_INITIAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_INITIAL_API_KEY" $prefix }}
            - name: IRON_CONTROL_AR_ENCRYPTION_PRIMARY_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_AR_ENCRYPTION_PRIMARY_KEY" $prefix }}
            - name: IRON_CONTROL_AR_ENCRYPTION_DETERMINISTIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_AR_ENCRYPTION_DETERMINISTIC_KEY" $prefix }}
            - name: IRON_CONTROL_AR_ENCRYPTION_KEY_DERIVATION_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_AR_ENCRYPTION_KEY_DERIVATION_SALT" $prefix }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_SECRET_KEY_BASE" $prefix }}
{{- if $console.googleOauth.enabled }}
            # Google OAuth app credentials (sign-in + brokered token refresh).
            # Gated on console.googleOauth.enabled; the keys must exist in the
            # shared infra Secret when enabled.
            - name: IRON_CONTROL_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_GOOGLE_CLIENT_ID" $prefix }}
            - name: IRON_CONTROL_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretEnv }}
                  key: {{ printf "%sIRON_CONTROL_GOOGLE_CLIENT_SECRET" $prefix }}
{{- end }}
            - name: RAILS_ENV
              value: {{ $console.railsEnv | quote }}
{{- with $console.slackDmSync.oauthAppSlug }}
            - name: CENTAUR_CONSOLE_SLACK_DM_SYNC_OAUTH_APP_SLUG
              value: {{ . | quote }}
{{- end }}
            - name: PORT
              value: {{ $console.service.httpPort | quote }}
            - name: RAILS_LOG_TO_STDOUT
              value: "1"
            - name: RAILS_SERVE_STATIC_FILES
              value: "1"
{{- if .Values.apiRs.enabled }}
            - name: CENTAUR_CONSOLE_CENTAUR_API_URL
              value: {{ printf "http://%s:%v" $apiRsName .Values.apiRs.port | quote }}
{{- end }}
          ports:
            - containerPort: {{ $console.service.httpPort }}
              name: http
          startupProbe:
            httpGet:
              path: /up
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /up
              port: http
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /up
              port: http
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
            # No readOnlyRootFilesystem — Rails writes to tmp/ at runtime.
            seccompProfile:
              type: RuntimeDefault
          resources:
{{ toYaml $console.resources | nindent 12 }}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.consoleName" . }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "console") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # api-rs is the control-plane caller (it registers principals/roles/grants
    # on startup and per session); per-sandbox
    # iron-proxy pods sync their effective config from the control plane over
    # /proxy/sync in managed mode. Widen this when another concrete client
    # integrates. (kubectl port-forward works regardless — it arrives via the
    # kubelet, not pod-to-pod.)
    - from:
{{- if .Values.apiRs.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 14 }}
{{- end }}
        # Per-sandbox iron-proxy pods pulling their config in managed mode.
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
{{- if $console.ingress.enabled }}
        # Ingress controller pods (Tailscale operator, Cloudflare, ...)
        # forwarding external traffic to console.
{{- range default .Values.networkPolicy.ingressControllerNamespaces .Values.networkPolicy.ingressSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ $console.service.httpPort }}
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
{{- if .Values.apiRs.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.apiRs.port }}
{{- end }}
    # Outbound HTTPS (external DB DSNs, IdPs, etc.).
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- end }}
