name: node-sync image

# Build + push the C4 node-sync image (provision-overlay + multi-session daemon)
# on GitHub-hosted runners — independent of the Depot-backed publish-images
# pipeline, which does not run on this fork. Pushes to ghcr under the running
# repo's own namespace using the built-in GITHUB_TOKEN (no external creds).
on:
  push:
    branches: [main]
    paths:
      - "services/api-rs/**"
      - ".github/workflows/node-sync-image.yml"
  pull_request:
    paths:
      - "services/api-rs/crates/centaur-node-sync/**"
      - ".github/workflows/node-sync-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: node-sync-image-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Push to the running repo's own ghcr namespace (the fork's GITHUB_TOKEN cannot
  # push to paradigmxyz). e.g. ghcr.io/gbasin/centaur/centaur-node-sync.
  IMAGE: ghcr.io/${{ github.repository }}/centaur-node-sync

jobs:
  build:
    name: build + push centaur-node-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Only log in / push on non-PR events (fork PRs get a read-only token).
      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      # Built from the api-rs workspace root, like ci/build-and-load.sh. amd64 only
      # for now (prod nodes are amd64); arm64 via QEMU is a follow-on if needed.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/api-rs
          file: services/api-rs/crates/centaur-node-sync/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
