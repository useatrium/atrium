{{- if .Values.networkPolicy.enabled }}
{{- $ingressSourceNamespaces := default .Values.networkPolicy.ingressControllerNamespaces .Values.networkPolicy.ingressSourceNamespaces }}
{{- $console := include "centaur.consoleValues" . | fromYaml }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-default-deny
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-allow-dns
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if and .Values.nodeSync.enabled .Values.nodeSync.atriumEgress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-node-sync-atrium-egress
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "node-sync") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
{{- if .Values.nodeSync.atriumEgress.ipBlock }}
        - ipBlock:
            cidr: {{ .Values.nodeSync.atriumEgress.ipBlock | quote }}
{{- else }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.nodeSync.atriumEgress.namespace | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.nodeSync.atriumEgress.port }}
---
{{- end }}
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
{{- if .Values.apiRs.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 14 }}
        # Python workflow-host sandboxes connect to Postgres directly via
        # DATABASE_URL (the host process, not its tool calls, which go through
        # the per-sandbox iron-proxy). api-rs labels them
        # centaur.ai/component=workflow-run.
        - podSelector:
            matchLabels:
              centaur.ai/component: workflow-run
{{- end }}
{{- if .Values.slackbotv2.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbotv2") | nindent 14 }}
{{- end }}
{{- if .Values.linearbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "linearbot") | nindent 14 }}
{{- end }}
{{- if .Values.githubbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "githubbot") | nindent 14 }}
{{- end }}
{{- if .Values.discordbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "discordbot") | nindent 14 }}
{{- end }}
{{- if .Values.teamsbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "teamsbot") | nindent 14 }}
{{- end }}
{{- if $console.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 14 }}
{{- if $console.worker.enabled }}
        # console Solid Queue worker (bin/jobs) reaches the app + queue DBs.
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console-worker") | nindent 14 }}
{{- end }}
{{- end }}
        # iron-proxy pods forward the tool-server sidecar's pool to Postgres
        # (the sidecar reaches the core DB through the per-sandbox proxy, not
        # directly), so the proxy must be allowed to connect.
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
      ports:
        - protocol: TCP
          port: 5432
---
{{- end }}
{{- if .Values.apiRs.enabled }}
# Python workflow-host sandboxes (centaur.ai/component=workflow-run) are spawned
# by api-rs, so the per-sandbox egress policy api-rs renders already covers their
# proxy, the control plane, and DNS. The host process additionally talks to
# Postgres directly (DATABASE_URL) and may make direct outbound HTTPS calls
# (mirroring api-rs), neither of which the per-sandbox policy grants -- without
# this the host fails to start with ECONNREFUSED to Postgres under any enforcing
# CNI (the default-deny denies all egress).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-workflow-run
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/component: workflow-run
  policyTypes:
    - Egress
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
    # Trusted workflow code may make direct outbound HTTPS calls (mirrors api-rs).
    - ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-rs") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api-rs") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
{{- if .Values.slackbotv2.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbotv2") | nindent 14 }}
{{- end }}
{{- if .Values.linearbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "linearbot") | nindent 14 }}
{{- end }}
{{- if .Values.githubbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "githubbot") | nindent 14 }}
{{- end }}
{{- if .Values.discordbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "discordbot") | nindent 14 }}
{{- end }}
{{- if .Values.teamsbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "teamsbot") | nindent 14 }}
{{- end }}
{{- if $console.enabled }}
        # Console pages call api-rs for admin-backed views such as ETLs.
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 14 }}
{{- if $console.worker.enabled }}
        # Console background jobs call api-rs for sync ingestion/checkpoints.
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console-worker") | nindent 14 }}
{{- end }}
{{- end }}
        # New sandboxes call back into the control plane only when their
        # principal has the API server sandbox capability.
        - podSelector:
            matchLabels:
              centaur.ai/api-server-enabled: "true"
{{- range .Values.networkPolicy.apiIngressSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.apiRs.port }}
---
# Sandboxes with the API server capability may call api-rs. New sandbox and
# proxy pods receive centaur.ai/api-server-enabled=true from api-rs only when
# the principal has the capability, so default-deny blocks new pods without it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-sandbox-api-server
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/api-server-enabled: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.apiRs.port }}
---
{{- if .Values.networkPolicy.observabilityEgress.enabled }}
{{- if not .Values.networkPolicy.observabilityEgress.destinations }}
{{- fail "networkPolicy.observabilityEgress.destinations must contain at least one destination when networkPolicy.observabilityEgress.enabled is true" }}
{{- end }}
# Sandboxes with the observability capability may call the configured
# in-cluster observability backends.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-observability-egress
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/observability-enabled: "true"
  policyTypes:
    - Egress
  egress:
{{- range $index, $destination := .Values.networkPolicy.observabilityEgress.destinations }}
{{- if not $destination.ports }}
{{- fail (printf "networkPolicy.observabilityEgress.destinations[%d].ports must contain at least one port" $index) }}
{{- end }}
    - to:
        - namespaceSelector:
{{- if $destination.namespaceSelector }}
{{ toYaml $destination.namespaceSelector | nindent 12 }}
{{- else }}
            matchLabels:
              kubernetes.io/metadata.name: {{ required (printf "networkPolicy.observabilityEgress.destinations[%d].namespace is required when namespaceSelector is unset" $index) $destination.namespace | quote }}
{{- end }}
{{- with $destination.podSelector }}
          podSelector:
{{ toYaml . | nindent 12 }}
{{- end }}
      ports:
{{- range $portIndex, $port := $destination.ports }}
        - protocol: {{ default "TCP" $port.protocol }}
          port: {{ required (printf "networkPolicy.observabilityEgress.destinations[%d].ports[%d].port is required" $index $portIndex) $port.port }}
{{- end }}
{{- end }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-rs") }}-egress
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api-rs") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api-rs") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
    # Per-sandbox iron-proxy listeners (HTTP proxy + postgres + management API).
    - to:
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
        - protocol: TCP
          port: {{ .Values.ironProxy.service.pgPort }}
        - protocol: TCP
          port: {{ .Values.ironProxy.service.managementPort }}
{{- if $console.enabled }}
    # console control plane: register principals/roles/grants and per-sandbox proxies.
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "console") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $console.service.httpPort }}
{{- end }}
{{- if .Values.networkPolicy.otlpEgress.enabled }}
    # OTLP trace export (e.g. Laminar). The collector lives in another
    # namespace; without this rule api-rs's own spans die with
    # BatchSpanProcessor "network error" export failures.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ required "networkPolicy.otlpEgress.namespace is required when networkPolicy.otlpEgress.enabled" .Values.networkPolicy.otlpEgress.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.otlpEgress.port }}
{{- end }}
    - ports:
        - protocol: TCP
          port: 443
    # Kubernetes API egress. The kubernetes.default ClusterIP (:443) is DNAT'd
    # to the real endpoint port (6443 on k3s/kubeadm); enforcing CNIs match
    # egress post-DNAT, so allow that port or api-rs can't manage sandboxes.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.apiServerPort }}
---
{{- end }}
{{- if .Values.slackbotv2.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbotv2") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbotv2") | nindent 4 }}
spec:
