name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  surface:
    name: Surface
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run inside the official Playwright image: browsers + system deps are
    # pre-installed, so there is no flaky azureedge browser download (which
    # deterministically hung after the main artifact on GitHub runners). Tag
    # MUST track the pinned @playwright/test version in surface/e2e.
    container:
      image: mcr.microsoft.com/playwright:v1.49.1-noble

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atrium
        options: >-
          --health-cmd "pg_isready -U atrium -d atrium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Inside a job container, service containers are reached by their label
      # hostname on the container port (not localhost:5433).
      DATABASE_URL: postgres://atrium:atrium@postgres:5432/atrium
      # The mobile typecheck regenerates Expo typed routes; keep the CLI off
      # the network.
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Must match the packageManager pins in surface/package.json and
          # packages/centaur-client/package.json (the action fails on mismatch,
          # which is the point — one pnpm line everywhere, including Docker).
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: surface/pnpm-lock.yaml

      # surface resolves packages/centaur-client's TypeScript source directly
      # (exports point at src/), so dist/ is not needed for typecheck or tests
      # here — but the Docker server image compiles against dist/, so keep the
      # build honest in CI. It doubles as the package's typecheck (~1s).
      - name: Install centaur client dependencies
        working-directory: packages/centaur-client
        run: pnpm install --frozen-lockfile

      - name: Build centaur client
        working-directory: packages/centaur-client
        run: pnpm build

      # This package sits outside the surface workspace, so `pnpm -r test`
      # below never reaches it — run its suite explicitly.
      - name: Test centaur client
        working-directory: packages/centaur-client
        run: pnpm test

      - name: Install surface workspace
        working-directory: surface
        run: pnpm install --frozen-lockfile

      - name: Typecheck surface workspace
        working-directory: surface
        timeout-minutes: 4
        run: pnpm -r typecheck

      # Production web build: Caddy serves web/dist in prod but nothing else
      # exercises it (e2e uses the Vite dev server). ~3s, so verify it here.
      - name: Build web production bundle
        working-directory: surface
        run: pnpm --filter @atrium/web build

      # Server tests dominate the suite (~31s of ~34s) because every file
      # shares one Postgres database serially (vitest.config.ts). The helper
      # creates the database named by ATRIUM_TEST_DB on demand, so three vitest
      # shards on three databases run concurrently (max shard ~16s), with the
      # non-server suites alongside. Each stream logs to its own file and is
      # replayed sequentially so failures stay attributable.
      - name: Test surface workspace
        working-directory: surface
        timeout-minutes: 6
        shell: bash
        run: |
          set -uo pipefail
          pnpm --filter '!@atrium/server' -r test > /tmp/test-rest.log 2>&1 &
          rest_pid=$!
          shard_pids=()
          for i in 1 2 3; do
            (cd server && ATRIUM_TEST_DB="atrium_test_shard_${i}" pnpm vitest run --shard="${i}/3") \
              > "/tmp/test-server-${i}.log" 2>&1 &
            shard_pids+=("$!")
          done
          status=0
          wait "$rest_pid" || status=1
          echo "===== non-server suites ====="
          cat /tmp/test-rest.log
          for i in 1 2 3; do
            wait "${shard_pids[$((i - 1))]}" || status=1
            echo "===== server shard ${i}/3 ====="
            cat "/tmp/test-server-${i}.log"
          done
          exit "$status"

      # No browser-install step: the Playwright container already has Chromium.
      # Per-step timeout so a webServer/teardown hang is killed fast and
      # attributed, instead of silently eating the whole job budget.
      - name: Run Playwright e2e
        working-directory: surface
        timeout-minutes: 10
        env:
          # playwright.config.ts reads E2E_DATABASE_URL for the webServer (it
          # falls back to a localhost:5433 default otherwise). db-reset.mjs
          # creates/truncates this dedicated DB using the atrium DB on the same
          # Postgres service as admin.
          E2E_DATABASE_URL: postgres://atrium:atrium@postgres:5432/atrium_e2e
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: surface/e2e/playwright-report/
          if-no-files-found: ignore
