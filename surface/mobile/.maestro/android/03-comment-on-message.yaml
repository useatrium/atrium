appId: chat.atrium.app
name: Android comment on a message
tags: [android, power-user]
---
- runFlow: ../common/authenticated-launch.yml
- tapOn: "general"
- extendedWaitUntil:
    visible: "Message #general"
    timeout: 10000
- tapOn: "Message #general"
- inputText: "Maestro Android comment probe"
- tapOn: "Send message"
- extendedWaitUntil:
    visible: ".*Maestro Android comment probe.*"
    timeout: 15000
- tapOn:
    text: "Comment"
    below: ".*Maestro Android comment probe.*"
- assertVisible: "No comments yet."
- takeScreenshot: "android-comments-01-sheet"
- tapOn: ".*Add a comment.*"
- inputText: "validated by Android Maestro"
- tapOn: "Send comment"
- assertVisible: ".*validated by Android Maestro.*"
- takeScreenshot: "android-comments-02-posted"
