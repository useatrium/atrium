{{- if and .Values.ingress.enabled (or .Values.slackbotv2.enabled .Values.linearbot.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbotv2") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbotv2") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.defaultBackend }}
  defaultBackend:
    service:
      name: {{ include "centaur.componentName" (dict "root" . "component" "slackbotv2") }}
      port:
        number: 3001
  {{- else }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
{{- if .Values.linearbot.enabled }}
          # Linear webhook deliveries route to the linearbot; everything else
          # stays with slackbotv2 (the catch-all below). Funnel-style
          # defaultBackend ingresses cannot route both — use httpRoutes or a
          # second ingress there.
          - path: /api/webhooks/linear
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" "linearbot") }}
                port:
                  number: 3001
{{- end }}
{{- if .Values.slackbotv2.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" "slackbotv2") }}
                port:
                  number: 3001
{{- end }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
