[project]
name = "company_context"
description = "Search indexed company history, user-visible Slack DMs, and Google Docs. Prefer this over direct Slack or Drive search for historical queries. Current sources: Slack, Slack DMs, Google Docs, Google Calendar, Linear."
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "asyncpg>=0.30.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.scripts]
company_context = "company_context.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "company_context"

[tool.centaur]
module = "client.py"

[[tool.centaur.secrets]]
type = "pg_dsn"
name = "company_context_dsn"
database = "centaur"
secret_ref = "CENTAUR_POSTGRES_DSN"
role = "centaur_slack_reader"
settings = [
    { name = "centaur.slack_channel_id", value_from = { principal_label = "slack_channel_id" } },
    { name = "centaur.slack_team_id", value_from = { principal_label = "slack_team_id" } },
    { name = "centaur.slack_user_id", value_from = { principal_label = "slack_user_id" } },
]
