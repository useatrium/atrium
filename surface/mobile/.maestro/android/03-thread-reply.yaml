appId: chat.atrium.app
name: Android thread reply
tags: [android, power-user]
---
- runFlow: ../common/authenticated-launch.yml
- tapOn: "general"
- extendedWaitUntil:
    visible: ".*Message #general.*"
    timeout: 10000
- tapOn: ".*Message #general.*"
- inputText: "Maestro Android thread probe"
- tapOn: "Send message"
- extendedWaitUntil:
    visible: ".*Maestro Android thread probe.*"
    timeout: 15000
- tapOn: ".*#general.*"
- longPressOn: ".*Maestro Android thread probe.*"
- tapOn: "Reply in thread"
- assertVisible: "Thread"
- tapOn: ".*Reply in thread.*"
- inputText: "validated by Android Maestro"
- tapOn: "Send message"
- assertVisible: ".*validated by Android Maestro.*"
- takeScreenshot: "android-thread-01-replied"
