name: Security

on:
  pull_request:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security_changes:
    name: Detect security-relevant changes
    runs-on: ubuntu-latest
    outputs:
      dependencies: ${{ steps.filter.outputs.dependencies }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: filter
        name: Detect changed paths
        shell: bash
        run: |
          dependencies=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${base}...HEAD")"

            if printf '%s\n' "${changed_files}" | grep -Eq \
              '(^|/)package\.json$|(^|/)pnpm-lock\.yaml$|(^|/)Cargo\.toml$|(^|/)Cargo\.lock$|^\.github/workflows/security\.yml$'; then
              dependencies=true
            fi
          fi

          echo "dependencies=${dependencies}" >>"${GITHUB_OUTPUT}"

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    needs: security_changes
    if: github.event_name == 'pull_request' && !github.event.repository.private && needs.security_changes.outputs.dependencies == 'true'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
