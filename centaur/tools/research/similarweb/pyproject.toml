[project]
name = "similarweb"
description = "SimilarWeb web traffic and market intelligence"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
similarweb = "centaur_tool_similarweb.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_similarweb"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "SIMILARWEB_API_KEY", mode = "inject", inject_query_param = "api_key", hosts = ["api.similarweb.com"]}]
