name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migration-order:
    name: Migration order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check migration versions
        run: .github/scripts/check-migration-order.sh "origin/${{ github.base_ref || 'main' }}"

  rust-api:
    name: Rust API fmt, clippy, and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: services/api-rs

      - name: Format
        working-directory: services/api-rs
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: services/api-rs
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: services/api-rs
        run: cargo test --workspace

  slackbotv2-tests:
    name: Slackbot v2 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Slackbot v2 tests
        working-directory: services/slackbotv2
        run: bun test test

  discordbot-checks:
    name: Discordbot typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Workspace-root install: discordbot links @centaur/* workspace packages
      # and relies on the root pnpm patches.
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Discordbot
        working-directory: services/discordbot
        run: bun run check:types

      - name: Discordbot tests
        working-directory: services/discordbot
        run: bun run test
