# CLA gate — blocks PRs from external contributors until they have signed the
# Individual CLA (.github/cla/individual.md). Signatures are recorded by the
# CLA Assistant Lite action on the `cla-signatures` branch of this repo
# (signatures/version1/cla.json), so no external service holds them. That
# branch must already exist with an initial {"signedContributors":[]} file —
# the action cannot create the branch itself.
#
# If the CLA text ever materially changes, bump path-to-signatures to
# version2/ and re-collect: existing signatures must keep pointing at the
# text people actually signed.
#
# Signing flow: the bot comments on a first-time contributor's PR; they sign
# by replying with a comment containing the sign sentence. `recheck` re-runs
# the check.
name: CLA

on:
  issue_comment:
    types: [created]
  merge_group:
    types: [checks_requested]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

# Serialize runs per PR: overlapping runs read-modify-write the shared
# signature file, and the loser of that race fails with a 409.
concurrency:
  group: cla-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-latest
    # pull_request_target runs with a repo-write token on the PR's behalf;
    # this job must never check out or execute PR code — it only reads/writes
    # signature state and PR comments via the API. The issue_comment gate
    # requires the comment to be on a PR (issues have no pull_request field).
    if: (github.event_name == 'merge_group') || (github.event_name == 'pull_request_target') || (github.event_name == 'issue_comment' && github.event.issue.pull_request && (contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA') || github.event.comment.body == 'recheck'))
    steps:
      - name: Skip CLA validation for merge queue
        if: github.event_name == 'merge_group'
        run: echo "The CLA was validated before entering the merge queue."

      - name: CLA Assistant Lite
        if: github.event_name != 'merge_group'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/useatrium/atrium/blob/master/.github/cla/individual.md
          branch: cla-signatures
          allowlist: gbasin,*[bot]
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can accept it, we ask
            that you sign our [Contributor License
            Agreement](https://github.com/useatrium/atrium/blob/master/.github/cla/individual.md).
            You can sign by posting the comment below. If you are contributing
            on behalf of your employer, your employer may also need to sign the
            [Corporate
            CLA](https://github.com/useatrium/atrium/blob/master/.github/cla/corporate.md)
            — see that document for how.
