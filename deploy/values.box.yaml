# Atrium single-box (OVH) production overrides for Centaur, layered on top of
# centaur/contrib/chart/values.dev.yaml + infra/values.local.yaml.
#
# Per-user BYO-subscription config (token-never-in-box):
#  - iron-control (console) ON — per-principal credential grants + broker refresh
#    worker; iron-control secrets are pre-seeded in centaur-infra-env.
#  - iron-proxy ON in per-user subscription mode — injects each user's own
#    ChatGPT/Claude token on the wire from a per-principal grant; the access_token
#    harness fragment injects nothing (no deployment-wide broker).
#  - sandboxes run in access_token (subscription) mode with dummy default creds.
#  - repo-cache ON for node-local tools/workflow checkouts, sandbox NetworkPolicy
#    off, node-sync capture ON.
#
# Image repositories point at the local registry so deploys push SHA-tagged
# images and roll back by tag; the tag is passed per-deploy via --set (redeploy.sh).
# console included: it is SHA-pinned like the rest so helm upgrades actually roll
# its pods and rollback can address the previous console build.

repoCache:
  enabled: true
  githubToken:
    existingSecretName: centaur-repo-cache-github-token
    secretKey: token

overlays:
  sources:
    # Atrium vendors Centaur as a subtree. Use the private workspace repo as the
    # single repo-cache source, and point Centaur runtime surfaces at the subtree
    # paths while composing the full workspace under ~/repos/useatrium/atrium.
    - repo: useatrium/atrium
      ref: master
      toolsSubdir: centaur/tools
      workflowsSubdir: centaur/workflows
      skillsSubdir: centaur/.agents/skills

networkPolicy:
  enabled: false

# iron-control / Rails control plane (per-principal grants + broker refresh).
console:
  enabled: true
  image:
    repository: localhost:5000/library/centaur-console

apiRs:
  sandboxWarmPoolSize: 1
  # The chart default is 3 days. On a single 193GB box that does not fit: the agent
  # image is ~10.6GB per build, every deploy makes a new one, and a Sandbox CR pins
  # its image for its whole lifetime — registry-gc.sh and kubelet image GC both
  # correctly refuse to reclaim a pinned image ("protecting 50 in-use tag(s)",
  # "freed 0 bytes"). At ~14 sandboxes/day a 3-day pin held 42 CRs across 19 distinct
  # agent images and the box hit 91%. Max-lifetime is the only thing that deletes a
  # CR — measured 2026-07-16: the oldest CR was 71.1h, i.e. nothing survives past the
  # reaper and nothing else collects them. 12h keeps the pin window just above the 6h
  # idle backstop (sandboxIdleCleanupBackstopSecs), so an idle sandbox is stopped well
  # before it is reaped. Resume is transcript-based, so a reaped session respawns.
  sandboxMaxLifetimeSecs: 43200 # 12h (chart default 259200 = 3d)
  image:
    repository: localhost:5000/library/centaur-api-rs
  # Enable iron-proxy (override infra/values.local.yaml's `disabled`) in per-user
  # subscription mode: per-principal grants carry the token; no shared broker.
  ironProxy:
    mode: enabled
    perUserSubscription: true

ironProxy:
  image:
    repository: localhost:5000/library/centaur-iron-proxy

sandbox:
  image:
    repository: localhost:5000/library/centaur-agent
  # Subscription mode: the box gets dummy chatgpt/claude creds; iron-proxy injects
  # the real per-user token on the wire.
  codexAuthMode: access_token
  claudeCodeAuthMode: access_token
  # Namespaces the node dep/compile cache keys away from entries the previous fat
  # agent image populated. The slim image (Dockerfile.agent) drops the nightly Rust
  # toolchain and other build inputs, so a cargo/sccache entry built under the fat
  # image must not hydrate into a slim sandbox — the legacy (lockfile_hash, kind)
  # key alone can't tell them apart. Bump this string on any future toolchain change.
  warmcacheToolchainId: slim-v1

nodeSync:
  enabled: true
  extraEnv:
    # Path-scoped capture scans (#469): event-driven dirty paths patch an
    # in-memory tree belief; backstop full scans + the divergence canary
    # remain on. Shadow-mode soak was clean (see #471/#472 for the two
    # instrument findings). Flip back to full scans by removing this.
    NODE_SYNC_SCOPED_SCAN: "1"
  overlayProvisioning:
    enabled: true
    flatHome: true
  atriumBaseUrl: "http://10.42.0.1:3001"
  image:
    repository: localhost:5000/library/centaur-node-sync
