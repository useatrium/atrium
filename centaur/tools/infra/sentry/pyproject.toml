[project]
name = "sentry"
description = "Sentry issues — list/search issues, issue details, events, stacktraces, and tag values (read-only)"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
    "httpx>=0.27.0",
]

[project.scripts]
sentry = "centaur_tool_sentry.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_sentry"

[tool.centaur]
module = "client.py"
hosts = ["sentry.io", "*.sentry.io"]
secrets = [
    {type = "http", name = "SENTRY_AUTH_TOKEN", match_headers = ["Authorization"], hosts = ["sentry.io", "*.sentry.io"]},
]
