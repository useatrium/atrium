# The rotating token blob and client_secret are encrypted and are set in test
# setup via the model, not here -- encrypt_fixtures is off. client_id is not
# encrypted, so it lives here; these fixtures sit in "bootstrapping" status.
acme_managed_gmail:
  namespace: acme
  foreign_id: managed-gmail
  name: managed-gmail
  labels:
    team: comms
  token_endpoint: https://oauth2.googleapis.com/token
  client_id: gmail-client-id
  scopes:
    - https://www.googleapis.com/auth/gmail.readonly
  created_by: acme_admin

globex_managed_api:
  namespace: globex
  foreign_id: managed-api
  name: managed-api
  token_endpoint: https://idp.globex.example/oauth/token
  client_id: globex-client-id
  created_by: globex_admin
