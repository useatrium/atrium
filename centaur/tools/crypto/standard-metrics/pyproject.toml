[project]
name = "standard-metrics"
description = "Standard Metrics CLI for portfolio company data and analytics"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
standard-metrics = "centaur_tool_standard_metrics.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_standard_metrics"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.centaur]
module = "client.py"
secrets = [
    {type = "http", name = "STANDARD_METRICS_CLIENT_ID", match_headers = ["Authorization"], hosts = ["api.standardmetrics.io"]},
    {type = "http", name = "STANDARD_METRICS_CLIENT_SECRET", match_headers = ["Authorization"], hosts = ["api.standardmetrics.io"]},
]
