[project]
name = "docsend"
description = "DocSend document downloader — cloud browser + Playwright"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
    "browser-use-sdk>=2.0.14",
    "httpx>=0.28.0",
    "pillow>=12.0.0",
    "playwright>=1.50.0",
]

[project.scripts]
docsend = "centaur_tool_docsend.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.sources]
"." = "centaur_tool_docsend"

[tool.centaur]
module = "client.py"
secrets = [{type = "http", name = "BROWSER_USE_API_KEY", match_query = true, hosts = ["connect.browser-use.com"]}]
