services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-atrium}
      POSTGRES_USER: ${DB_USER:-atrium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_HOST_PORT:-5433}:5432"
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-atrium}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?set MINIO_PASSWORD in .env}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${MINIO_HOST_PORT:-9000}:9000"
    volumes:
      - atrium_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    build:
      context: ../..
      dockerfile: surface/deploy/Dockerfile.server
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-atrium}:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/${DB_NAME:-atrium}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT to a phone-reachable URL}
      S3_BUCKET: ${S3_BUCKET:-atrium-files}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-atrium}
      S3_SECRET_KEY: ${MINIO_PASSWORD:?set MINIO_PASSWORD in .env}
      CENTAUR_BASE_URL: ${CENTAUR_BASE_URL:-http://127.0.0.1:18000}
      CENTAUR_API_KEY: ${CENTAUR_API_KEY:-}
      ARTIFACT_CAPTURE_API_KEY: ${ARTIFACT_CAPTURE_API_KEY:-}
      # CAS-ledger GC sweeps unreferenced blobs (only-unreferenced + grace
      # window, so safe). On by default in prod; override to 0 in .env to disable.
      ARTIFACT_GC_ENABLED: ${ARTIFACT_GC_ENABLED:-1}
      CENTAUR_HARNESS: ${CENTAUR_HARNESS:-codex}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      IRON_CONTROL_BASE_URL: ${IRON_CONTROL_BASE_URL:-}
      IRON_CONTROL_API_KEY: ${IRON_CONTROL_API_KEY:-}
      IRON_CONTROL_NAMESPACE: ${IRON_CONTROL_NAMESPACE:-default}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_REDIRECT_URL: ${GITHUB_APP_REDIRECT_URL:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_PRIVATE_KEY_ID: ${GITHUB_APP_PRIVATE_KEY_ID:-}
      GITHUB_PUBLIC_READ_TOKEN: ${GITHUB_PUBLIC_READ_TOKEN:-}
      AUTH_OPEN: ${AUTH_OPEN:-0}
      AUTH_DEV_CODES: ${AUTH_DEV_CODES:-0}
      EMAIL_MODE: ${EMAIL_MODE:-log}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUSH_REDACT: ${PUSH_REDACT:-1}
      # Web Push (browser notifications). Unset → webpush delivery is a noop.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # VoIP call-ring push (APNs PushKit / FCM data). Unset → noop sender.
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_AUTH_KEY_P8: ${APNS_AUTH_KEY_P8:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_SANDBOX: ${APNS_SANDBOX:-0}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}
      # Voice message STT defaults to noop. To enable self-hosted whisper.cpp,
      # install ffmpeg + whisper.cpp + a model in the image and set:
      # STT_PROVIDER: whispercpp
      # WHISPER_MODEL_PATH: /models/ggml-base.en.bin
      # WHISPER_BIN: whisper-cli
    ports:
      - "${BIND_HOST:-127.0.0.1}:${SERVER_HOST_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # OVH production topology:
  # - Atrium app/files stay behind Cloudflare Tunnel and local Caddy.
  # - Use docker-compose.tunnel.yml so Caddy binds 127.0.0.1:80 only.
  # - LiveKit signaling can be exposed as HTTPS/WSS by Cloudflare Tunnel to
  #   localhost:7880.
  # - LiveKit TURN/TLS, TURN/UDP, ICE TCP fallback, and media stay direct on the
  #   host network. Open these inbound firewall ports:
  #     443/tcp for TURN/TLS
  #     7881/tcp for ICE TCP fallback
  #     3478/udp for TURN/UDP
  #     50000-60000/udp for SFU media
  livekit:
    # Opt-in: `docker compose --profile livekit up`. In the OVH tunnel topology,
    # run with docker-compose.tunnel.yml so public 443 is reserved for LiveKit
    # TURN/TLS while Caddy only serves the Cloudflare Tunnel loopback listener.
    profiles: ["livekit"]
    image: livekit/livekit-server:v1.13
    network_mode: host
    restart: unless-stopped
    environment:
      # Single source of truth: the same keys the Fastify server signs tokens
      # with, so signer and verifier can't disagree (format "key: secret").
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-}: ${LIVEKIT_API_SECRET:-}"
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ${LIVEKIT_CONFIG_FILE:-./livekit.yaml}:/etc/livekit.yaml:ro
      # Set LIVEKIT_TURN_DOMAIN to the certificate directory and keep it in sync
      # with turn.domain in the generated runtime LiveKit config.
      - /etc/letsencrypt/live/${LIVEKIT_TURN_DOMAIN:-turn.example.com}/fullchain.pem:/etc/livekit/turn.crt:ro
      - /etc/letsencrypt/live/${LIVEKIT_TURN_DOMAIN:-turn.example.com}/privkey.pem:/etc/livekit/turn.key:ro

  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    depends_on:
      server:
        condition: service_healthy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  atrium_pgdata:
  atrium_minio:
  caddy_data:
  caddy_config:
